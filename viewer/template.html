<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ground Knowledge — research disputes, mapped</title>
<style>
  :root{
    --bg:#F5F6F7; --surface:#FFFFFF; --ink:#15171B; --muted:#61676E; --faint:#8A9098;
    --line:#E4E7EA; --line-strong:#CDD2D7; --chrome:#1B1D24;
    --ochre:#8a6510; --ochre-bg:#F5ECD6; --flag:#2f6296; --flag-bg:#E7EEF6;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;} html,body{margin:0;}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.55;
    -webkit-font-smoothing:antialiased;font-size:15px;}
  .wrap{max-width:980px;margin:0 auto;padding:32px 24px 80px;}
  a{color:var(--flag);text-decoration:none;cursor:pointer;} a:hover{text-decoration:underline;}
  header.top{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:16px;
    border-bottom:1px solid var(--line-strong);padding-bottom:18px;margin-bottom:8px;}
  .brand{font-size:13px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-family:var(--mono);}
  h1{font-size:25px;font-weight:600;margin:6px 0 0;letter-spacing:-.01em;}
  .sub{color:var(--muted);font-size:14px;margin-top:4px;max-width:52ch;}
  .seg{display:inline-flex;border:1px solid var(--line-strong);border-radius:8px;overflow:hidden;background:var(--surface);}
  button{cursor:pointer;}
  .seg button{appearance:none;border:0;background:transparent;font:inherit;color:var(--muted);padding:8px 14px;cursor:pointer;font-size:13px;transition:background .12s,color .12s;}
  .seg button+button{border-left:1px solid var(--line);}
  .seg button:hover{background:#eef0f1;color:var(--ink);}
  .seg button[aria-pressed="true"]{background:var(--chrome);color:#fff;}
  nav.tabs{display:flex;gap:2px;margin:22px 0 4px;border-bottom:1px solid var(--line);}
  nav.tabs button{appearance:none;border:0;background:transparent;font:inherit;cursor:pointer;
    color:var(--muted);padding:10px 4px;margin-right:22px;font-size:14px;position:relative;transition:color .12s;}
  nav.tabs button:hover{color:var(--ink);}
  nav.tabs button[aria-selected="true"]{color:var(--ink);font-weight:500;}
  nav.tabs button[aria-selected="true"]::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--chrome);}
  .qbar{margin:22px 0 6px;} .qbar .q{font-size:18px;font-weight:600;}
  .qbar .meta{font-family:var(--mono);font-size:12px;color:var(--faint);margin-top:2px;}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:18px 20px;margin:16px 0;}
  .panel h3{margin:0 0 4px;font-size:14px;font-weight:600;}
  .panel .hint{font-family:var(--mono);font-size:11.5px;color:var(--faint);margin:0 0 14px;}
  .subnote{color:var(--muted);font-size:13px;margin:0 0 16px;line-height:1.5;}
  .splitlabel{font-size:13px;font-weight:600;color:var(--ink);margin:18px 0 7px;display:flex;
    align-items:baseline;gap:8px;flex-wrap:wrap;}
  .splitlabel .num{font-family:var(--mono);color:var(--faint);font-weight:400;}
  .splitlabel .q{font-weight:400;color:var(--faint);font-size:12px;}
  .takeaway{margin:14px 0 2px;font-size:14px;line-height:1.55;color:var(--ink);
    background:var(--flag-bg);border-left:3px solid var(--flag);border-radius:0 8px 8px 0;padding:12px 15px;}
  .method-alert{margin:14px 0 2px;font-size:14px;line-height:1.55;color:var(--ink);
    background:var(--ochre-bg);border:1px solid #E3CD99;border-left:4px solid var(--ochre);
    border-radius:0 9px 9px 0;padding:13px 15px;}
  .method-alert .risk-kicker{font-family:var(--mono);font-size:11px;letter-spacing:.06em;
    text-transform:uppercase;color:var(--ochre);font-weight:700;margin-bottom:3px;}
  .method-alert .risk-link{appearance:none;border:1px solid #D5B873;background:#fff;color:var(--ochre);
    border-radius:6px;padding:5px 9px;margin-top:9px;font:inherit;font-size:12px;cursor:pointer;}
  .method-alert .risk-link:hover{background:#FFF8E8;}
  .distrib{display:flex;height:40px;border-radius:8px;overflow:hidden;border:1px solid var(--line);}
  .distrib .seg-bar{display:block;line-height:40px;text-align:center;font-size:12px;font-family:var(--mono);
    cursor:pointer;border:0;color:#fff;min-width:0;padding:0 8px;transition:opacity .15s;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .distrib .seg-bar.dim{opacity:.32;}
  .distrib .seg-bar:hover{filter:brightness(1.1);box-shadow:inset 0 0 0 2px rgba(255,255,255,.5);}
  .legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:12px;font-size:12.5px;color:var(--muted);}
  .legend .key{display:inline-flex;align-items:center;gap:7px;cursor:pointer;transition:color .12s;}
  .legend .key:hover{color:var(--ink);text-decoration:underline;}
  .legend .dot{width:11px;height:11px;border-radius:3px;display:inline-block;}
  .riskbadge{font-family:var(--mono);font-size:10px;color:var(--ochre);background:var(--ochre-bg);
    border:1px solid #E3CD99;border-radius:5px;padding:1px 6px;white-space:nowrap;}
  .skew{font-family:var(--mono);font-size:12px;color:var(--ochre);background:var(--ochre-bg);
    border-radius:8px;padding:9px 12px;margin-top:14px;display:flex;gap:8px;align-items:flex-start;}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;}
  .card{border:1px solid var(--line);border-radius:11px;padding:14px 15px;background:var(--surface);border-left-width:3px;}
  .card .ct{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .card .titlewrap{min-width:0;flex:1 1 auto;}
  .card .title{font-size:14.5px;font-weight:600;overflow-wrap:anywhere;} .card .yr{font-family:var(--mono);font-size:11px;color:var(--faint);}
  .stance{font-family:var(--mono);font-size:11px;padding:4px 9px;border-radius:6px;white-space:normal;
    text-align:right;flex:0 1 auto;max-width:52%;line-height:1.4;}
  .tags{margin-top:11px;display:flex;flex-wrap:wrap;gap:6px;}
  .tag{font-family:var(--mono);font-size:11px;padding:3px 8px;border-radius:6px;background:#F1F3F4;color:var(--muted);}
  .tag.industry{background:var(--ochre-bg);color:var(--ochre);} .tag.rests{background:#EFF1F2;color:var(--faint);}
  .tag.new{background:var(--flag-bg);color:var(--flag);}
  .tag.retr{background:#F6E0DB;color:#B4502E;font-weight:600;}
  .strength{margin-left:6px;letter-spacing:1px;font-size:9px;vertical-align:middle;}
  .strength.s3{color:#2E8B6F;} .strength.s2{color:#8a6510;} .strength.s1{color:var(--faint);}
  .srcmeta{font-size:12px;color:var(--faint);font-style:italic;margin:1px 0 8px;overflow-wrap:anywhere;}
  .why{margin-top:10px;padding:9px 11px;border-left:3px solid var(--line-strong);background:#FAFBFB;
       border-radius:0 7px 7px 0;font-size:12.5px;line-height:1.5;color:var(--muted);}
  .why .wl{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.04em;text-transform:uppercase;
       color:var(--faint);margin-bottom:3px;}
  .why q{color:var(--ink);font-style:italic;quotes:"“" "”";}
  .why .conf{display:block;margin-top:7px;font-family:var(--mono);font-size:10px;color:var(--faint);cursor:help;}
  .why .conf.low{color:var(--ochre);}
  .card.retracted{background:#FCF3F1;border-color:#E6C3BA;}
  .bs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;}
  .bs{border:1px solid var(--line);border-radius:11px;padding:13px 15px;}
  .bs .bs-h{font-family:var(--mono);font-size:12px;margin-bottom:8px;display:flex;align-items:center;gap:7px;}
  .bs ul{margin:0;padding-left:16px;} .bs li{font-size:13px;color:var(--muted);margin:4px 0;} .bs li b{color:var(--ink);font-weight:500;}
  .mtxscroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  table.mtx{border-collapse:collapse;width:100%;font-size:13px;}
  table.mtx th,table.mtx td{padding:9px 10px;text-align:center;border:1px solid var(--line);}
  table.mtx th.factor,table.mtx td.factor{text-align:left;font-weight:500;width:34%;}
  table.mtx thead th{font-family:var(--mono);font-size:11.5px;font-weight:500;color:#fff;overflow-wrap:break-word;vertical-align:top;}
  table.mtx thead th:not(.factor){min-width:74px;}
  table.mtx td.cell{font-family:var(--mono);font-size:11px;color:var(--ink);font-weight:600;}
  table.mtx tr.crux td.factor{font-weight:600;}
  .wkey{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin:12px 0 0;}
  .wkey .ws{font-family:var(--mono);font-size:11px;padding:2px 9px;border-radius:5px;border:1px solid var(--line);}
  .cruxbadge{font-family:var(--mono);font-size:10px;color:#fff;background:var(--chrome);border-radius:5px;padding:2px 6px;margin-left:8px;vertical-align:1px;}
  .onetag{font-family:var(--mono);font-size:10px;color:var(--faint);margin-left:8px;}
  table.mtx tr.onesided td{opacity:.5;}
  .rationale{font-size:13px;color:var(--muted);background:#FAFBFB;border-left:3px solid var(--line-strong);
    padding:10px 14px;margin:12px 0 0;border-radius:0 8px 8px 0;display:none;}
  .rationale.show{display:block;}
  tr.factor-row{cursor:pointer;} tr.factor-row:hover td{background:#FAFBFB;}
  .ind-row{display:grid;grid-template-columns:1fr auto;gap:18px;align-items:start;padding:15px 0;border-bottom:1px solid var(--line);}
  .ind-row:last-child{border-bottom:0;}
  .ind-name{font-size:14px;font-weight:500;} .ind-sub{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-top:3px;}
  .ind-sub2{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:8px;}
  .cmeter{position:relative;height:26px;border:1px solid var(--line);border-radius:7px;background:#F4F6F7;overflow:hidden;margin-top:9px;max-width:460px;}
  .cmeter-fill{position:absolute;left:0;top:0;bottom:0;opacity:.22;}
  .cmeter-lab{position:relative;font-family:var(--mono);font-size:11px;color:var(--ink);padding:0 9px;line-height:26px;white-space:nowrap;}
  .ind-readout{text-align:right;min-width:78px;}
  .ind-readout .pctn{font-family:var(--mono);font-size:21px;font-weight:600;line-height:1.1;}
  .ind-readout .plab{font-family:var(--mono);font-size:10px;color:var(--faint);}
  .ind2{padding:15px 0;border-bottom:1px solid var(--line);} .ind2:last-child{border-bottom:0;}
  .ind2 .hd{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
  .ind2 .hd .dot{width:10px;height:10px;border-radius:3px;display:inline-block;}
  .ind2 .hd b{font-size:14.5px;}
  .ind2 .eff{font-family:var(--mono);font-size:12px;color:var(--ink);margin-left:auto;}
  .ind2 .eff .m{color:var(--faint);}
  .bases{display:flex;flex-wrap:wrap;gap:6px;margin:9px 0 0;}
  .base{display:flex;align-items:center;gap:7px;border:1px solid var(--line);border-radius:8px;
        padding:5px 9px;background:#fff;max-width:100%;}
  .base .bk{width:8px;height:8px;border-radius:2px;flex:0 0 auto;}
  .base .bl{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:230px;}
  .base .bw{font-family:var(--mono);font-size:10px;color:var(--faint);white-space:nowrap;}
  .ind-note{font-size:12px;color:var(--muted);margin:8px 0 0;}
  .ind-note.warn{color:var(--ochre);font-weight:500;}
  .indkey{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin:2px 0 14px;}
  .indkey span{display:flex;align-items:center;gap:6px;} .indkey i{width:8px;height:8px;border-radius:2px;display:inline-block;}
  .base .bk-ic{font-size:11px;line-height:1;color:#b4232f;flex:0 0 auto;}
  .indkey .warn{color:#b4232f;font-style:normal;font-weight:700;}
  .domline{font-family:var(--mono);font-size:12px;color:var(--flag);background:var(--flag-bg);border-radius:8px;
    padding:9px 12px;margin:0 0 16px;display:flex;gap:8px;align-items:flex-start;}
  .flagbox{font-size:13px;color:var(--flag);background:var(--flag-bg);border-radius:8px;padding:11px 14px;margin-top:6px;
    display:flex;gap:9px;align-items:flex-start;line-height:1.5;}
  .empty-state{text-align:center;padding:54px 28px;}
  .empty-state .mark{width:46px;height:46px;margin:0 auto 16px;border-radius:12px;background:var(--flag-bg);
    color:var(--flag);display:grid;place-items:center;font-family:var(--mono);font-size:21px;}
  .empty-state h2{font-size:19px;margin:0 0 7px;}
  .empty-state p{max-width:54ch;margin:0 auto;color:var(--muted);font-size:14px;}
  .empty-state .empty-action{display:inline-block;margin-top:19px;background:var(--chrome);color:#fff;
    border-radius:8px;padding:9px 15px;font-size:13px;font-weight:500;}
  .empty-state .empty-action:hover{text-decoration:none;background:#30333c;}
  .ch{border-left:2px solid var(--line-strong);padding:2px 0 2px 16px;margin:0 0 4px 6px;position:relative;}
  .ch::before{content:"";position:absolute;left:-5px;top:14px;width:8px;height:8px;border-radius:50%;background:var(--chrome);}
  .ch-h{font-size:14px;font-weight:600;margin-top:8px;}
  .ch-meta{font-family:var(--mono);font-size:11px;color:var(--faint);margin:1px 0 7px;}
  .ch-diff{font-family:var(--mono);font-size:12px;color:var(--muted);background:#FAFBFB;border:1px solid var(--line);
    border-radius:8px;padding:9px 12px;}
  .ch-diff div{margin:3px 0;} .ch-diff div.warn{color:var(--ochre);} .ch-diff div.add{color:var(--flag);}
  footer.note{margin-top:30px;font-family:var(--mono);font-size:11px;color:var(--faint);border-top:1px solid var(--line);padding-top:14px;line-height:1.7;}
  .empty{padding:60px 20px;text-align:center;color:var(--muted);}
  @media (max-width:640px){
    .wrap{padding:20px 14px 60px;}
    h1{font-size:20px;} header.top .sub{display:none;} header.top{padding-bottom:14px;gap:10px;}
    nav.tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;margin:16px 0 4px;}
    nav.tabs::-webkit-scrollbar{height:0;}
    nav.tabs button{white-space:nowrap;flex:0 0 auto;margin-right:18px;padding:10px 2px;font-size:13px;}
    .qbar{margin:16px 0 6px;} .qbar .q{font-size:16px;}
    .panel{padding:15px 14px;}
    .cards{grid-template-columns:1fr;} .bs-grid{grid-template-columns:1fr;}
    table.mtx{font-size:12px;} table.mtx th,table.mtx td{padding:7px 7px;}
    table.mtx th.factor,table.mtx td.factor{width:auto;min-width:128px;}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div>
      <div class="brand">Ground Knowledge</div>
      <h1>Research disputes, mapped by the evidence</h1>
      <div class="sub">Who holds which position, where the disagreement actually lives, and whether an apparent consensus is real — or the same few sources counted many times.</div>
    </div>
    <div class="seg" id="caseSwitch" role="group" aria-label="Choose a case"></div>
  </header>
  <nav class="tabs" id="tabs" role="tablist" aria-label="Views"></nav>
  <div class="qbar"><div class="q" id="qText"></div><div class="meta" id="qMeta"></div></div>
  <div id="view"></div>
  <footer class="note" id="foot"></footer>
</div>

<script>
/* This file is RENDER-ONLY. Every number was computed once, in Python (engine/assess.py),
   and baked into DATA by `python cli.py build`. The viewer never recomputes — so there is
   no drift between what the pipeline concludes and what you see. DATA = { order, cases:{ id:
   { kb, assessment } } }. kb.log carries the per-version diff that powers the Changes tab. */
const DATA = /*__DATA__*/null;

const VIEWS=[
  {id:"coverage",label:"Coverage & warnings"},
  {id:"divergence",label:"Divergence matrix"},
  {id:"independence",label:"Independence & bias"},
  {id:"changes",label:"Changes"},
];
const state={caseId:DATA&&DATA.order[0], view:"coverage", filter:null};
const el=id=>document.getElementById(id);
function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function rgba(hex,a){const n=parseInt(hex.slice(1),16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}
function pct(x){return Math.round(x*100)+"%";}
function cur(){return DATA.cases[state.caseId];}
function maps(kb){
  const pos={},ds={}; kb.positions.forEach(p=>pos[p.id]=p); kb.datasets.forEach(d=>ds[d.id]=d);
  return {pos,ds};
}

// ONE renderer for every warning kind (concentration / method-monoculture / quote) -- see
// engine/assess.py::warnings. Used in both the Coverage and Independence tabs so a warning is
// never a bespoke banner maintained in two places with two different wordings.
function warningsHtml(warnings, showLink){
  const kicker={concentration:"Apparent consensus is correlated",
    "method-monoculture":"Potential shared-method bias", quote:"Unverified quote"};
  return (warnings||[]).map(w=>`<div class="method-alert">
      <div class="risk-kicker">${esc(kicker[w.kind]||w.badge)}</div>
      <div>${esc(w.detail)}</div>
      ${showLink&&w.kind!=="quote"&&w.kind!=="low-confidence"?'<button class="risk-link" data-view="independence">See the evidence bases</button>':""}
    </div>`).join("");
}

function caseLabel(c){
  // CLI cases have a human id ("eggs"); portal questions have a generated hex id — for those
  // show a short version of the question instead, so the chip is informative.
  const mid=c.kb.meta.id||"";
  if(/^[0-9a-f]{8,}$/i.test(mid)){
    const q=c.kb.meta.question||mid;
    return q.length>44?q.slice(0,42)+"…":q;
  }
  return mid;
}
function renderChrome(){
  // a single chip for one question is just a redundant label (the question shows below) — hide it
  el("caseSwitch").style.display = DATA.order.length>1 ? "" : "none";
  el("caseSwitch").innerHTML=DATA.order.map(id=>{
    const c=DATA.cases[id];
    return `<button data-case="${id}" aria-pressed="${id===state.caseId}">${esc(caseLabel(c))}</button>`;
  }).join("");
  el("tabs").innerHTML=VIEWS.map(v=>
    `<button role="tab" data-view="${v.id}" aria-selected="${v.id===state.view}">${esc(v.label)}</button>`).join("");
  const kb=cur().kb;
  el("qText").textContent=kb.meta.question;
  el("qMeta").textContent=`v${kb.meta.version} · ${kb.sources.length} sources · ${kb.positions.length} positions · ${kb.factors.length} factors · ${kb.datasets.length} datasets`;
}

function shortLabel(s, max=20){
  // Fallback for KBs without a stored shortLabel: plain word-boundary truncation
  if(s.length <= max) return s;
  const cut = s.lastIndexOf(' ', max);
  return (cut > max * 0.4 ? s.slice(0, cut) : s.slice(0, max)) + '…';
}

// Evidence-strength tier from study design — a quality signal, not a gameable "trust score".
function strengthTier(ev){
  const e=(ev||"").toLowerCase();
  if(/rct|experimental|meta-analysis|evidence-synthesis|systematic/.test(e)) return {n:3,label:"strong evidence"};
  if(/observational|cohort|case-control|mechanistic|prospective/.test(e)) return {n:2,label:"moderate evidence"};
  if(/commentary|narrative|expert|advisory|opinion|editorial/.test(e)) return {n:1,label:"weaker evidence"};
  return {n:0,label:""};
}

function renderCoverage(c){
  const {kb,assessment:a}=c, {pos,ds}=maps(kb), active=state.filter;
  const warningBadges={};   // positionId -> [{kind,badge}] -- drives the legend risk badges below
  (a.warnings||[]).forEach(w=>(warningBadges[w.positionId]=warningBadges[w.positionId]||[]).push(w));
  const bar=a.distribution.map(d=>{
    const dim=active&&active!==d.id?"dim":"";
    const barLabel = (pos[d.id] && pos[d.id].shortLabel) || shortLabel(d.label);
    return `<button class="seg-bar ${dim}" data-pos="${d.id}" style="flex:${d.count||0.0001};background:${d.hue}"
      title="${esc(d.label)} — ${d.count} sources">${d.pct>=10?esc(barLabel)+" · "+d.pct+"%":d.pct+"%"}</button>`;
  }).join("");
  // Weighted bar — the anti-false-balance view: each position sized by effective INDEPENDENT
  // evidence (nEff), not raw count, so positions propped up by re-used data shrink.
  const wd=a.weightedDistribution||[];
  const wbar=wd.map(d=>{
    const dim=active&&active!==d.id?"dim":"";
    const barLabel=(pos[d.id]&&pos[d.id].shortLabel)||shortLabel(d.label);
    return `<button class="seg-bar ${dim}" data-pos="${d.id}" style="flex:${d.weight||0.0001};background:${d.hue}"
      title="${esc(d.label)} — ${d.raw} sources ≈ ${(d.weight||0).toFixed(1)} independent looks">${d.pct>=10?esc(barLabel)+" · "+d.pct+"%":d.pct+"%"}</button>`;
  }).join("");
  // Plain-language takeaway: which position shrinks most when weighted by independence?
  let takeaway="";
  if(wbar){
    const rawById={}; a.distribution.forEach(d=>rawById[d.id]=d);
    let big=null;
    wd.forEach(w=>{const r=rawById[w.id]; if(!r)return; const drop=r.pct-w.pct;
      if(big===null||drop>big.drop) big={label:w.label,rawPct:r.pct,wPct:w.pct,drop:drop};});
    takeaway = (big && big.drop>=5)
      ? `<div class="takeaway">Weighted by independence, <b>${esc(big.label)}</b> drops from <b>${big.rawPct}%</b> of sources to <b>${big.wPct}%</b> of the independent evidence — its support rests on fewer distinct datasets than the headcount implies.</div>`
      : `<div class="takeaway">The two views largely agree here — each position's evidence is about as independent as it is numerous.</div>`;
  }
  const warningHtml=warningsHtml(a.warnings, true);
  const legend=a.distribution.map(d=>{
    const badges=(warningBadges[d.id]||[]).map(w=>`<span class="riskbadge">${esc(w.badge)}</span>`).join("");
    return `<span class="key" data-pos="${d.id}"><span class="dot" style="background:${d.hue}"></span>${esc(d.label)} <span style="font-family:var(--mono);color:var(--faint)">(${d.count})</span>${badges}</span>`;
  }).join("");
  let skewHtml="";
  if(a.fundingSkew){
    const f=a.fundingSkew, parts=[];
    if(f.top) parts.push(`of ${f.n} interested-funding source${f.n===1?"":"s"} (industry/advocacy), the largest share back <b style="color:var(--ochre)">"${esc(f.top.label)}"</b>`);
    if(f.undisclosed) parts.push(`${f.undisclosed} of ${f.total} source${f.total===1?"":"s"} don't disclose funding`);
    if(parts.length) skewHtml=`<div class="skew"><span>⚠</span><span>${parts.join("; ")} — weigh before counting heads.</span></div>`;
  }
  const maxVer=kb.meta.version;
  const cards=kb.sources.filter(s=>!active||s.position===active).map(s=>{
    const p=pos[s.position];
    const rests=(s.restsOn||[]).map(id=>`<span class="tag rests">↳ ${esc(ds[id]?ds[id].label:id)}</span>`).join("");
    const isNew=s.addedIn&&s.addedIn===maxVer&&maxVer>1;
    const st=strengthTier(s.evidence);
    const pip=st.n?`<span class="strength s${st.n}" title="${st.label} — by study design">${"●".repeat(st.n)}${"○".repeat(3-st.n)}</span>`:"";
    const venueBits=[];
    if(s.venue) venueBits.push(esc(s.venue));
    if(s.citations!=null) venueBits.push(`${esc(s.citations)} citation${s.citations===1?"":"s"}`);
    const venueLine=venueBits.length?`<div class="srcmeta">${venueBits.join(" · ")}</div>`:"";
    const pq=((s.provenance||{}).position)||{};
    const qn=q=>String(q||"").toLowerCase().replace(/[^a-z0-9]+/g," ").trim();
    // Drop a "quote" that justifies nothing: the paper's title echoed back (substring, so a
    // "… - PMC" suffix still counts), or a metadata / boilerplate line (publication dates,
    // "accepted for publication", "a literature search was conducted", …).
    if(pq.quote){const q=qn(pq.quote),t=qn(s.title);
      const META=/^(accepted for publication|received|published|revised|first published|a (comprehensive )?literature search was conducted|this (review|article|study) (summari|describe|present))/;
      if(q && ((t && (q===t || (q.length>=12 && (t.indexOf(q)>=0||q.indexOf(t)>=0)))) || META.test(q)))
        pq.quote="";}
    const conf=pq.extractionConfidence;
    const confHtml=conf!=null?`<span class="conf${conf<0.5?" low":""}" title="How sure the labeller was that this quote justifies placing the source under “${esc(p.label)}”. Lower = more of a judgement call, worth checking against the source.">${conf<0.5?"⚠ ":""}Labelling confidence: ${Math.round(conf*100)}%${conf<0.5?" — judgement call":""}</span>`:"";
    const depthLabel={full:"full text",abstract:"abstract only",partial:"page text"}[s.textDepth];
    const depthTag=depthLabel?`<span class="tag" title="How much of the source the labeller actually had: ${esc(depthLabel)}.">${esc(depthLabel)}</span>`:"";
    const quoteWarn=(pq.verifiedQuote==="missing"&&s.textDepth==="full")
      ?`<span class="conf low" title="This quote does not match the full text we fetched for this source.">⚠ quote not found in fetched text</span>`:"";
    const why=pq.quote?`<div class="why"><span class="wl">Filed under “${esc(p.label)}” because</span><q>${esc(pq.quote)}</q>${confHtml}${quoteWarn}</div>`:"";
    return `<div class="card${s.retracted?" retracted":""}" style="border-left-color:${p.hue}">
      <div class="ct"><div class="titlewrap"><span class="title">${s.url?`<a href="${esc(s.url)}" target="_blank" rel="noopener noreferrer">${esc(s.title)}</a>`:esc(s.title)}</span> <span class="yr">${esc(s.year||"")}</span></div>
        <span class="stance" style="background:${rgba(p.hue,.13)};color:${p.hue}">${esc(p.label)}</span></div>
      ${venueLine}
      <div class="tags">
        ${s.retracted?`<span class="tag retr">⚠ RETRACTED</span>`:""}
        <span class="tag">${esc(s.evidence)}${pip}</span>
        <span class="tag ${/industry|advocacy/i.test(s.funding)?'industry':(/undisclosed/i.test(s.funding)?'rests':'')}">${esc(s.funding||'Undisclosed')}</span>
        ${s.population&&s.population!=="—"?`<span class="tag">${esc(s.population)}</span>`:""}
        <span class="tag">conf: ${esc(s.confidence)}</span>
        ${depthTag}
        ${isNew?`<span class="tag new">added v${s.addedIn}</span>`:""}
        ${rests}
      </div>${why}</div>`;
  }).join("");
  const bsCards=a.blindspots.map(p=>{
    const items=[];
    if(p.missingEvidence.length) items.push(`<li>never argues from <b>${p.missingEvidence.map(esc).join(", ")}</b></li>`);
    if(p.missingPop.length) items.push(`<li>doesn't address <b>${p.missingPop.map(esc).join(", ")}</b></li>`);
    if(!items.length) items.push(`<li style="color:var(--faint)">covers every evidence type & subgroup present</li>`);
    return `<div class="bs"><div class="bs-h"><span class="dot" style="width:10px;height:10px;border-radius:3px;background:${p.hue}"></span>${esc(p.label)} skips</div><ul>${items.join("")}</ul></div>`;
  }).join("");
  return `
    <div class="panel"><h3>How the evidence base splits</h3>
      <p class="subnote">Two views of the same evidence: by <b>how many sources</b> take each side, then by <b>how much independent evidence</b> each side actually rests on.</p>
      <div class="splitlabel"><span class="num">1</span> By source count <span class="q">— the naïve tally · click a segment to filter</span></div>
      <div class="distrib">${bar}</div>
      ${wbar?`
      <div class="splitlabel"><span class="num">2</span> Weighted by independent evidence <span class="q">— sources sharing a dataset collapse into one “look”</span></div>
      <div class="distrib">${wbar}</div>
      ${takeaway}`:""}
      ${warningHtml}
      <div class="legend">${legend}</div>${skewHtml}</div>
    <div class="panel"><h3>Sources${active?` — ${esc(pos[active].label)}`:""}</h3>
      <p class="hint">each source tagged with evidence type, funding, population, and the datasets it rests on (↳)</p>
      <div class="cards">${cards}</div></div>
    <div class="panel"><h3>Blindspots — what each side leaves out</h3>
      <p class="hint">blindspots() — evidence types & subgroups present in the case but absent from a position's own sources</p>
      <div class="bs-grid">${bsCards}</div></div>`;
}

function renderDivergence(c){
  const {kb,assessment:a}=c;
  const cruxBy={}; a.cruxes.forEach(x=>cruxBy[x.id]=x);
  const info=f=>cruxBy[f.id]||{spread:0,isCrux:false,engaged:0};
  const WLABEL={high:"high",med:"med",low:"low","n/a":"n/a"}, WV={high:3,med:2,low:1,"n/a":0};
  const WCELL={3:"#2f6296",2:"#7fa8ce",1:"#dce6f0",0:"transparent"};   // weight heat-scale
  // cruxes first, then factors >=2 camps engage, then one-sided (only one camp weighs them)
  const rank=z=>z.isCrux?0:(z.engaged>=2?1:2);
  const ordered=[...kb.factors].sort((x,y)=>{const ix=info(x),iy=info(y);
    return rank(ix)-rank(iy) || iy.spread-ix.spread || iy.engaged-ix.engaged;});
  const head=`<th class="factor">Factor</th>`+kb.positions.map(p=>`<th style="background:${p.hue}" title="${esc(p.label)}">${esc(p.shortLabel||shortLabel(p.label))}</th>`).join("");
  const rows=ordered.map(f=>{
    const cx=info(f), one=cx.engaged<2;
    const cells=kb.positions.map(p=>{
      const w=f.weights[p.id]||"—"; const v=WV[w]||0;
      // colour by the WEIGHT (low/med/high) on one scale, so the rank reads at a glance —
      // the position is already told by the coloured column header.
      const bg=WCELL[v], txt=v===3?"#fff":(v?"var(--ink)":"var(--faint)");
      return `<td class="cell" style="background:${bg};color:${txt}">${WLABEL[w]||"—"}</td>`;
    }).join("");
    const tag=cx.isCrux?'<span class="cruxbadge">CRUX</span>':(one?'<span class="onetag">one side only</span>':'');
    return `<tr class="factor-row ${cx.isCrux?'crux':''} ${one?'onesided':''}" data-factor="${f.id}">
        <td class="factor">${esc(f.label)}${tag}</td>${cells}</tr>
      <tr><td colspan="${kb.positions.length+1}" style="padding:0;border:0">
        <div class="rationale" id="r-${f.id}">${esc(f.rationale||"")}</div></td></tr>`;
  }).join("");
  const nCrux=a.cruxes.filter(x=>x.isCrux).length;
  const nOne=a.cruxes.filter(x=>x.engaged<2).length;
  const nShared=a.cruxes.length-nCrux-nOne;
  return `<div class="panel"><h3>Where the disagreement actually lives</h3>
      <p class="subnote">Each cell shows <b>how heavily that camp weighs that factor</b> — the colour is the weight. A <b>crux</b> (bold row) is a factor the camps weigh very differently; that's where the disagreement actually is. Click a row for the rationale.</p>
      <div class="wkey">weight: <span class="ws" style="background:#dce6f0">low</span><span class="ws" style="background:#7fa8ce">med</span><span class="ws" style="background:#2f6296;color:#fff">high</span><span class="ws" style="border-style:dashed;color:var(--faint)">— not weighed</span></div>
      <div class="mtxscroll"><table class="mtx" style="margin-top:12px"><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>
      <p style="font-size:13px;color:var(--muted);margin:14px 0 0">
        <b>${nCrux} crux${nCrux===1?'':'es'}</b> · ${nShared} shared · ${nOne} raised by one side.
        Resolving the cruxes would move the conclusion; the dimmed rows are dimensions only one camp engages — not points of disagreement.</p></div>`;
}

function renderIndependence(c){
  const a=c.assessment;
  // Evidence-KIND swatches use an achromatic ramp (dark=primary/strong, light=secondary/weak) +
  // a ⚠ glyph for circular — deliberately OUTSIDE the coloured stance palette so a kind can never
  // be mistaken for a position hue.
  const KIND={dataset:{lab:"primary dataset",col:"#222a35"},
              primary:{lab:"own observation",col:"#222a35"},
              secondary:{lab:"secondary voice",col:"#c4ccd4"},
              cycle:{lab:"circular loop",icon:"⚠"}};
  const methodByPos={};
  (a.methodAudit||[]).forEach(m=>methodByPos[m.id]=m);
  const rows=a.independence.map(p=>{
    const eff=p.nEff.toFixed(1);
    const ma=methodByPos[p.id];
    const bases=(p.bases||[]).map(b=>{
      const k=KIND[b.kind]||KIND.dataset;
      const tag=k.lab+(b.secondaryOnly?" · via review only":"")+(b.nonHuman?" · animal / in-vitro":"")+(b.weight>1?" ×"+b.weight:"");
      const sw=k.icon?`<span class="bk-ic">${k.icon}</span>`:`<span class="bk" style="background:${k.col}"></span>`;
      return `<div class="base" title="${esc(b.label)} — ${tag}">
        ${sw}<span class="bl">${esc(b.label)}</span><span class="bw">${tag}</span></div>`;
    }).join("")||`<span class="muted">—</span>`;
    const sec=p.collapsedSecondary>1?`<div class="ind-note">${p.collapsedSecondary} secondary sources (reviews / commentary / statements) counted as <b>one</b> voice — echo doesn't add independence.</div>`:"";
    const circ=(p.circular&&p.circular.length)?`<div class="ind-note warn">⚠ circular corroboration — ${p.circular.length} citation loop${p.circular.length>1?"s":""} that bottom out in no primary evidence.</div>`:"";
    let method="";
    if(ma&&ma.top){
      const allShare=pct(ma.top.count/(ma.raw||1));
      const sourceWord=ma.top.count===1?"source":"sources";
      const grouped=ma.classed===ma.raw
        ?"Every source in this position has a recognizable method-risk family."
        :`This simple check recognized method-risk families for ${ma.classed} of ${ma.raw} sources; the rest are secondary evidence or designs it does not group.`;
      const status=ma.monoculture
        ?"Warning: this is enough of the position to suggest a shared blind spot. It does not change the independent-bases count."
        :"This is below the position-wide warning threshold and does not change the independent-bases count.";
      method=`<div class="ind-note${ma.monoculture?" warn":""}">Method-bias check: ${ma.top.count} of ${ma.raw} sources fall into the same method-risk family: <b>${esc(ma.top.label)}</b> (${allShare} of all sources). ${grouped} ${status}</div>`;
    }
    return `<div class="ind2">
      <div class="hd"><span class="dot" style="background:${p.hue}"></span><b>${esc(p.label)}</b>
        <span class="eff">${eff} independent base${eff==="1.0"?"":"s"} <span class="m">from ${p.raw} source${p.raw===1?"":"s"}</span></span></div>
      <div class="bases">${bases}</div>${sec}${circ}${method}
    </div>`;
  }).join("");
  const flag=(a.warnings&&a.warnings.length) ? warningsHtml(a.warnings, false)
    : `<div class="flagbox"><span>No single dataset dominates a position — and review echo / circular citation are already collapsed below, so the bases shown are genuinely distinct.</span></div>`;
  return `<div class="panel"><h3>Is the consensus real, or the same evidence counted twice?</h3>
      <p class="subnote">Each position is reduced to its <b>independent evidence bases</b>: sources sharing a dataset, echoing as reviews, or citing each other in a loop collapse into one. The number after each position is its effective count of distinct bases — the honest size of its support.</p>
      <div class="indkey"><span><i style="background:#222a35"></i>primary evidence (dataset / own data)</span><span><i style="background:#c4ccd4"></i>secondary voice (collapsed echo)</span><span><b class="warn">⚠</b> circular loop</span></div>
      ${rows}${flag}</div>`;
}

function renderChanges(c){
  const kb=c.kb, log=(kb.log||[]).slice().reverse();
  const items=log.map(e=>{
    if(e.action==="seed"){
      return `<div class="ch"><div class="ch-h">v${e.version} · seeded</div>
        <div class="ch-meta">${esc(e.ts||"")}</div>
        <div class="ch-diff"><div>${e.sources||kb.sources.length} sources established the initial knowledge base.</div></div></div>`;
    }
    const diff=(e.diff||[]).map(line=>{
      const cls=line.indexOf("⚠")===0?"warn":(line.indexOf("+")===0?"add":"");
      return `<div class="${cls}">${esc(line)}</div>`;
    }).join("")||`<div style="color:var(--faint)">(no metric changes)</div>`;
    return `<div class="ch"><div class="ch-h">v${e.version} · added “${esc(e.title||e.source||"")}”</div>
      <div class="ch-meta">${esc(e.ts||"")}${e.newDatasets&&e.newDatasets.length?" · new dataset(s): "+e.newDatasets.map(esc).join(", "):""}</div>
      <div class="ch-diff">${diff}</div></div>`;
  }).join("");
  return `<div class="panel"><h3>How the picture changed as evidence arrived</h3>
    <p class="hint">each entry = one ingested source and what recomputing the metrics revealed · newest first</p>
    ${items||'<div class="empty">No history yet — only the seed.</div>'}</div>`;
}

function renderEmpty(){
  const portalAdd=document.querySelector('.pbar a[href$="/add"]');
  const action=portalAdd
    ? `<a class="empty-action" href="${esc(portalAdd.getAttribute("href"))}">Add the first source</a>`
    : "";
  return `<div class="panel empty-state">
    <div class="mark">∅</div>
    <h2>No sources yet</h2>
    <p>This question is ready, but no evidence has been added. Add the first source to build its coverage, divergence, and independence views.</p>
    ${action}
  </div>`;
}

function render(){
  if(!DATA){el("view").innerHTML='<div class="empty">No data baked in. Run <b>python cli.py build cases/eggs.kb.json cases/covid.kb.json</b> and open the generated <b>viewer/index.html</b>.</div>';return;}
  renderChrome();
  const c=cur();
  const empty=c.kb.sources.length===0;
  el("tabs").style.display=empty?"none":"";
  if(empty){state.filter=null;el("view").innerHTML=renderEmpty();return;}
  let html="";
  if(state.view==="coverage") html=renderCoverage(c);
  else if(state.view==="divergence") html=renderDivergence(c);
  else if(state.view==="independence") html=renderIndependence(c);
  else html=renderChanges(c);
  el("view").innerHTML=html;
}

document.addEventListener("click",e=>{
  const c=e.target.closest("[data-case]");
  if(c){state.caseId=c.dataset.case;state.filter=null;render();return;}
  const t=e.target.closest("[data-view]");
  if(t){state.view=t.dataset.view;render();return;}
  const pos=e.target.closest("[data-pos]");
  if(pos){state.filter=state.filter===pos.dataset.pos?null:pos.dataset.pos;render();return;}
  const fr=e.target.closest("[data-factor]");
  if(fr){const r=el("r-"+fr.dataset.factor);if(r)r.classList.toggle("show");return;}
});
render();
</script>
</body>
</html>

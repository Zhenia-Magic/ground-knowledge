<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ground Knowledge — research disputes, mapped</title>
<style>
  :root{
    --bg:#F5F6F7; --surface:#FFFFFF; --ink:#15171B; --muted:#61676E; --faint:#8A9098;
    --line:#E4E7EA; --line-strong:#CDD2D7; --chrome:#1B1D24;
    --ochre:#8a6510; --ochre-bg:#F5ECD6; --flag:#2f6296; --flag-bg:#E7EEF6;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    --rail-w:270px;
  }
  *{box-sizing:border-box;} html,body{margin:0;}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.55;
    -webkit-font-smoothing:antialiased;font-size:15px;}
  a{color:var(--flag);text-decoration:none;cursor:pointer;} a:hover{text-decoration:underline;}
  button{cursor:pointer;}

  /* ---------- shell / rail ---------- */
  .shell{display:flex;max-width:1440px;margin:0 auto;min-height:100vh;}
  .rail{width:var(--rail-w);flex:0 0 var(--rail-w);border-right:1px solid var(--line);
    padding:22px 18px;position:sticky;top:0;align-self:flex-start;height:100vh;
    overflow-y:auto;display:flex;flex-direction:column;
    scrollbar-width:none;-ms-overflow-style:none;}
  .rail::-webkit-scrollbar{display:none;}
  .backhome{display:inline-block;font-size:12px;color:var(--muted);margin-bottom:12px;}
  .backhome:hover{color:var(--flag);}
  .brand{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);
    font-family:var(--mono);margin-bottom:8px;}
  .qtitle{font-size:15px;font-weight:600;line-height:1.4;margin-bottom:4px;}
  .qmeta{font-family:var(--mono);font-size:11px;color:var(--faint);margin-bottom:18px;}
  .casesec{margin-bottom:14px;display:flex;flex-direction:column;gap:5px;}
  .cchip{display:block;width:100%;text-align:left;font:inherit;font-size:12px;color:var(--muted);
    background:transparent;border:1px solid transparent;border-radius:7px;padding:6px 8px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .cchip:hover{background:#EEF0F1;}
  .cchip[aria-pressed="true"]{background:var(--flag-bg);color:var(--flag);font-weight:600;
    border-color:var(--flag-bg);}
  nav#nav{margin-bottom:6px;}
  .navitem{display:flex;flex-direction:column;padding:8px 10px;border-radius:8px;cursor:pointer;
    margin-bottom:2px;border:0;background:transparent;font:inherit;text-align:left;width:100%;}
  .navitem:hover{background:#EEF0F1;}
  .navitem[aria-selected="true"]{background:var(--flag-bg);}
  .navitem .l{font-size:13.5px;color:var(--muted);}
  .navitem[aria-selected="true"] .l{color:var(--flag);font-weight:600;}
  .addsrc{display:block;text-align:center;width:100%;font:inherit;font-size:13px;font-weight:600;
    padding:9px 0;margin:6px 0 6px;border:1px solid var(--flag);border-radius:8px;
    background:var(--flag-bg);color:var(--flag);cursor:pointer;}
  .addsrc:hover{background:var(--flag);color:#fff;text-decoration:none;}
  .railsec{border-top:1px solid var(--line);margin-top:16px;padding-top:14px;}
  .railsec h4{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);
    margin:0 0 10px;font-weight:600;}
  .poschip{display:flex;align-items:center;gap:8px;padding:6px 4px;font-size:13px;color:var(--muted);
    cursor:pointer;border-radius:6px;}
  .poschip:hover{background:#EEF0F1;}
  .poschip .dot{width:9px;height:9px;border-radius:2px;flex:0 0 auto;}
  .poschip .lab{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .poschip .risk{color:var(--ochre);font-size:11px;flex:0 0 auto;}
  .poschip .n{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint);
    flex:0 0 auto;}
  .poschip.off{opacity:.4;}
  input[type=text],select{width:100%;font:inherit;font-size:12.5px;padding:7px 9px;
    border:1px solid var(--line-strong);border-radius:7px;background:var(--surface);
    color:var(--ink);margin-bottom:8px;}
  select{appearance:none;-webkit-appearance:none;-moz-appearance:none;padding-right:26px;
    background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><path d="M4 6l4 4 4-4" fill="none" stroke="%2361676E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>');
    background-repeat:no-repeat;background-position:right 8px center;cursor:pointer;}
  select:hover{border-color:var(--faint);}
  input[type=text]:focus,select:focus{outline:none;border-color:var(--flag);
    box-shadow:0 0 0 2px var(--flag-bg);}
  label.flagonly{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);
    cursor:pointer;margin-top:6px;}
  label.flagonly input{width:auto;margin:0;}
  .warnmini{border:1px solid #E3CD99;background:var(--ochre-bg);border-radius:7px;padding:8px 10px;
    font-size:11.5px;color:var(--ink);margin-bottom:8px;cursor:pointer;}
  .warnmini b{color:var(--ochre);display:block;font-size:10px;text-transform:uppercase;
    letter-spacing:.04em;margin-bottom:2px;}
  .caselinks{display:flex;flex-direction:column;gap:3px;}
  .caselinks .lbl{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.04em;
    margin:8px 0 2px;}
  .caselinks .lbl:first-child{margin-top:0;}
  .caselinks a{font-size:12.5px;color:var(--muted);}
  .caselinks a:hover{color:var(--flag);}

  /* ---------- main ---------- */
  .main{flex:1;min-width:0;padding:26px 32px 60px;}
  .main h1{font-size:20px;font-weight:600;margin:0 0 4px;}
  .mmeta{font-family:var(--mono);font-size:12px;color:var(--faint);margin-bottom:20px;}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:18px 20px;margin-bottom:16px;}
  .subnote{color:var(--muted);font-size:13px;margin:0 0 14px;line-height:1.5;}
  .splitlabel{font-size:13px;font-weight:600;color:var(--ink);margin:16px 0 7px;display:flex;
    align-items:baseline;gap:8px;flex-wrap:wrap;}
  .splitlabel:first-child{margin-top:0;}
  .splitlabel .num{font-family:var(--mono);color:var(--faint);font-weight:400;}
  .splitlabel .q{font-weight:400;color:var(--faint);font-size:12px;}
  .distrib{display:flex;height:36px;border-radius:8px;overflow:hidden;border:1px solid var(--line);}
  .seg{display:flex;align-items:center;justify-content:center;font-size:11.5px;font-family:var(--mono);
    color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:opacity .15s,filter .12s;
    min-width:0;padding:0 8px;border:0;background:transparent;}
  .seg:hover{filter:brightness(1.1);box-shadow:inset 0 0 0 2px rgba(255,255,255,.5);}
  .seg.dim{opacity:.32;}
  .takeaway{font-size:13.5px;background:var(--flag-bg);border-left:3px solid var(--flag);
    border-radius:0 8px 8px 0;padding:10px 14px;margin:14px 0 2px;}
  .method-alert{background:var(--ochre-bg);border:1px solid #E3CD99;border-left:4px solid var(--ochre);
    border-radius:0 9px 9px 0;padding:12px 14px;margin:14px 0 2px;font-size:13.5px;line-height:1.5;}
  .method-alert .risk-kicker{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;
    text-transform:uppercase;color:var(--ochre);font-weight:700;margin-bottom:3px;}
  .risk-link{appearance:none;border:1px solid #D5B873;background:#fff;color:var(--ochre);
    border-radius:6px;padding:5px 9px;margin-top:9px;font:inherit;font-size:12px;cursor:pointer;}
  .risk-link:hover{background:#FFF8E8;}
  .legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;font-size:12.5px;color:var(--muted);}
  .legend .key{display:inline-flex;align-items:center;gap:7px;cursor:pointer;transition:color .12s;
    border:0;background:transparent;font:inherit;padding:0;text-align:left;}
  .legend .key:hover{color:var(--ink);text-decoration:underline;}
  .legend .dot{width:11px;height:11px;border-radius:3px;display:inline-block;}
  .riskbadge{font-family:var(--mono);font-size:10px;color:var(--ochre);background:var(--ochre-bg);
    border:1px solid #E3CD99;border-radius:5px;padding:1px 6px;white-space:nowrap;}
  .skew{font-family:var(--mono);font-size:12px;color:var(--ochre);background:var(--ochre-bg);
    border-radius:8px;padding:9px 12px;margin-top:14px;display:flex;gap:8px;align-items:flex-start;}
  .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;
    flex-wrap:wrap;gap:8px;}
  .toolbar .count{font-size:12px;color:var(--muted);}
  .toggle{display:inline-flex;border:1px solid var(--line-strong);border-radius:7px;overflow:hidden;}
  .toggle button{border:0;background:transparent;font:inherit;font-size:11.5px;padding:6px 13px;
    cursor:pointer;color:var(--muted);}
  .toggle button.on{background:var(--chrome);color:#fff;}
  .toggle button+button{border-left:1px solid var(--line-strong);}
  table{width:100%;border-collapse:collapse;table-layout:fixed;}
  th{text-align:left;padding:8px 10px;font-size:10.5px;font-weight:600;color:var(--faint);
    text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--line);cursor:pointer;
    white-space:nowrap;background:#FAFBFB;overflow:hidden;text-overflow:ellipsis;}
  th.nosort{cursor:default;}
  td{padding:8px 10px;font-size:12.5px;border-bottom:1px solid var(--line);vertical-align:top;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  td.wrap{white-space:normal;}
  /* Line-clamping needs display:-webkit-box, which breaks a <td>'s table-cell layout if
     applied directly to it (collapses column widths / row heights) -- so this only ever
     goes on a <div> nested inside the cell, never the cell itself. */
  .clamp2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
    overflow:hidden;white-space:normal;}
  tbody tr.rowmain{cursor:pointer;}
  tbody tr.rowmain:hover td{background:#FAFBFB;}
  tr.onesided td{opacity:.55;}
  .tbl-wrap{border:1px solid var(--line);border-radius:9px;overflow:hidden;}
  .postag{font-size:10.5px;padding:2px 8px;border-radius:5px;white-space:nowrap;}
  .flagicon{color:var(--ochre);} .okicon{color:var(--faint);}
  .detailrow td{background:#FAFBFB;padding:12px 14px 14px 16px;font-size:12px;color:var(--muted);
    white-space:normal;}
  .detailrow .metarow{margin-bottom:6px;}
  .detailrow .q{font-style:italic;color:var(--ink);margin:6px 0;}
  .why{margin-top:8px;padding:9px 11px;border-left:3px solid var(--line-strong);background:var(--bg);
    border-radius:0 7px 7px 0;font-size:12px;line-height:1.5;color:var(--muted);}
  .why .wl{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.04em;
    text-transform:uppercase;color:var(--faint);margin-bottom:3px;}
  .why q{color:var(--ink);font-style:italic;quotes:"\201C" "\201D";}
  .conf{display:block;margin-top:7px;font-family:var(--mono);font-size:10px;color:var(--faint);
    cursor:help;}
  .conf.low{color:var(--ochre);}
  .showmore{text-align:center;padding:12px;}
  .showmore button{font:inherit;font-size:12px;padding:7px 16px;border:1px solid var(--line-strong);
    border-radius:7px;background:var(--surface);cursor:pointer;color:var(--muted);}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;}
  .card{border:1px solid var(--line);border-left:3px solid var(--line-strong);border-radius:10px;
    padding:13px 15px;background:var(--surface);}
  .card.retracted{background:#FCF3F1;border-color:#E6C3BA;}
  .card .ct{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .card .titlewrap{min-width:0;flex:1 1 auto;}
  .card .title{font-size:13.5px;font-weight:600;line-height:1.4;overflow-wrap:anywhere;}
  .card .yr{font-family:var(--mono);font-size:10.5px;color:var(--faint);white-space:nowrap;}
  .card .venue{font-size:11.5px;color:var(--faint);font-style:italic;margin:3px 0 9px;
    overflow-wrap:anywhere;}
  .card .tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:2px;}
  .tag{font-family:var(--mono);font-size:10.5px;padding:2px 7px;border-radius:5px;
    background:#F1F3F4;color:var(--muted);white-space:nowrap;}
  .tag.industry{background:var(--ochre-bg);color:var(--ochre);}
  .tag.rests{background:#EFF1F2;color:var(--faint);}
  .tag.new{background:var(--flag-bg);color:var(--flag);}
  .tag.retr{background:#F6E0DB;color:#B4502E;font-weight:600;}
  .strength{margin-left:3px;letter-spacing:1px;font-size:9px;vertical-align:middle;}
  .strength.s3{color:#2E8B6F;} .strength.s2{color:#8a6510;} .strength.s1{color:var(--faint);}
  .card .ds{font-size:11px;color:var(--faint);margin-top:8px;}
  .card .ds b{color:var(--muted);font-weight:600;}
  .factor{border:1px dashed var(--line-strong);border-radius:10px;padding:11px 16px;
    margin-bottom:8px;opacity:.75;}
  .factor.crux{border:1px solid var(--line);border-left:3px solid var(--flag);padding:13px 16px;
    margin-bottom:10px;opacity:1;}
  .factor.shared{opacity:1;}
  .factor .fh{display:flex;align-items:baseline;gap:8px;margin-bottom:3px;flex-wrap:wrap;}
  .factor .flabel{font-size:13px;font-weight:500;color:var(--muted);}
  .factor.crux .flabel{font-size:13.5px;font-weight:600;color:var(--ink);}
  .cruxbadge{font-family:var(--mono);font-size:9.5px;background:var(--chrome);color:#fff;
    border-radius:5px;padding:2px 7px;}
  .onetag{font-family:var(--mono);font-size:9.5px;color:var(--faint);}
  .wkey{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--muted);
    margin:12px 0 16px;}
  .wkey .ws{font-family:var(--mono);font-size:11px;padding:2px 9px;border-radius:5px;
    border:1px solid var(--line);}
  .bs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;}
  .bs{border:1px solid var(--line);border-radius:11px;padding:13px 15px;}
  .bs .bs-h{font-family:var(--mono);font-size:12px;margin-bottom:8px;display:flex;
    align-items:center;gap:7px;}
  .bs ul{margin:0;padding-left:16px;} .bs li{font-size:13px;color:var(--muted);margin:4px 0;}
  .bs li b{color:var(--ink);font-weight:500;}
  .indpos{margin-bottom:22px;}
  .indpos:last-child{margin-bottom:0;}
  .indpos .ph{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
  .indpos .plabel{font-size:14px;font-weight:600;}
  .indpos .peff{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--muted);}
  .infoicon{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;
    border-radius:50%;border:1px solid var(--faint);color:var(--faint);font-size:9.5px;
    font-family:var(--sans);cursor:help;vertical-align:1px;}
  .indkey{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin:0 0 16px;}
  .indkey span{display:flex;align-items:center;gap:6px;}
  .indkey i{width:8px;height:8px;border-radius:2px;display:inline-block;}
  .indkey .warn{color:#b4232f;font-style:normal;font-weight:700;}
  .ind-note{font-size:12px;color:var(--muted);margin:8px 0 0;}
  .ind-note.warn{color:var(--ochre);font-weight:500;}
  .flagbox{font-size:13px;color:var(--flag);background:var(--flag-bg);border-radius:8px;
    padding:11px 14px;margin-top:6px;display:flex;gap:9px;align-items:flex-start;line-height:1.5;}
  .deltawrap{display:flex;flex-wrap:wrap;gap:5px;white-space:normal;align-items:center;}
  .deltapill{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;
    color:var(--muted);border:1px solid var(--line-strong);border-radius:6px;padding:2px 7px;
    white-space:nowrap;}
  .deltapill .dot{width:7px;height:7px;border-radius:2px;flex:0 0 auto;}
  .deltamore{font-family:var(--mono);font-size:10.5px;color:var(--faint);align-self:center;}
  .empty-state{text-align:center;padding:54px 28px;}
  .empty-state .mark{width:46px;height:46px;margin:0 auto 16px;border-radius:12px;
    background:var(--flag-bg);color:var(--flag);display:grid;place-items:center;
    font-family:var(--mono);font-size:21px;}
  .empty-state h2{font-size:19px;margin:0 0 7px;}
  .empty-state p{max-width:54ch;margin:0 auto;color:var(--muted);font-size:14px;}
  .empty-state .empty-action{display:inline-block;margin-top:19px;background:var(--chrome);
    color:#fff;border-radius:8px;padding:9px 15px;font-size:13px;font-weight:500;}
  .empty-state .empty-action:hover{text-decoration:none;background:#30333c;}
  .empty{padding:40px;text-align:center;color:var(--muted);}
  @media (max-width:900px){
    .shell{flex-direction:column;}
    .rail{width:100%;flex:none;position:static;height:auto;border-right:0;
      border-bottom:1px solid var(--line);}
  }
  @media (max-width:640px){
    .main{padding:18px 16px 50px;}
    .panel{padding:14px 14px;}
    .cards{grid-template-columns:1fr;} .bs-grid{grid-template-columns:1fr;}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
</head>

</div>

const el=id=>document.getElementById(id);
function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}
function rgba(hex,a){const n=parseInt(hex.slice(1),16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}
function pct(x){return Math.round(x*100)+"%";}
function cur(){return DATA.cases[state.caseId];}
function maps(kb){
  const pos={},ds={}; kb.positions.forEach(p=>pos[p.id]=p); kb.datasets.forEach(d=>ds[d.id]=d);
  return {pos,ds};
}

// Fallback for KBs without a stored shortLabel: plain word-boundary truncation.
function shortLabel(s, max=20){
  s=String(s||"");
  if(s.length <= max) return s;
  const cut = s.lastIndexOf(' ', max);
  return (cut > max * 0.4 ? s.slice(0, cut) : s.slice(0, max)) + '…';
}

// Evidence-strength tier from study design -- a quality signal, not a gameable "trust score".
function strengthTier(ev){
  const e=(ev||"").toLowerCase();
  if(/rct|experimental|meta-analysis|evidence-synthesis|systematic/.test(e)) return {n:3,label:"strong evidence"};
  if(/observational|cohort|case-control|mechanistic|prospective/.test(e)) return {n:2,label:"moderate evidence"};
  if(/commentary|narrative|expert|advisory|opinion|editorial/.test(e)) return {n:1,label:"weaker evidence"};
  return {n:0,label:""};
}

// Drop a "quote" that justifies nothing: the paper's title echoed back, or a metadata /
// boilerplate line (publication dates, "accepted for publication", "a literature search was
// conducted", ...). Same guard as the pre-redesign template -- moved here so both the table
// and card views share it instead of duplicating the regex.
function cleanQuote(quote, title){
  if(!quote) return quote;
  const qn=q=>String(q||"").toLowerCase().replace(/[^a-z0-9]+/g," ").trim();
  const q=qn(quote), t=qn(title);
  const META=/^(accepted for publication|received|published|revised|first published|a (comprehensive )?literature search was conducted|this (review|article|study) (summari|describe|present))/;
  if(q && ((t && (q===t || (q.length>=12 && (t.indexOf(q)>=0||q.indexOf(t)>=0)))) || META.test(q))) return "";
  return quote;
}

function confBadge(conf, posLabel){
  if(conf==null) return "";
  const low=conf<0.5;
  return `<span class="conf${low?" low":""}" title="How sure the labeller was that this quote justifies placing the source under “${esc(posLabel)}”. Lower = more of a judgement call, worth checking against the source.">${low?"⚠ ":""}Labelling confidence: ${Math.round(conf*100)}%${low?" — judgement call":""}</span>`;
}

function quoteWarnHtml(pq, textDepth){
  return (pq.verifiedQuote==="missing" && textDepth==="full")
    ? `<span class="conf low" title="This quote does not match the full text we fetched for this source.">⚠ quote not found in fetched text</span>`
    : "";
}

// ONE renderer for every warning kind (concentration / method-monoculture / quote /
// low-confidence) -- see engine/assess.py::warnings. Used in both Coverage and Independence so
// a warning is never a bespoke banner maintained in two places with two different wordings.
function warningsHtml(warnings, showLink){
  const kicker={concentration:"Apparent consensus is correlated",
    "method-monoculture":"Potential shared-method bias", quote:"Unverified quote",
    "low-confidence":"Weak quote grounding"};
  return (warnings||[]).map(w=>`<div class="method-alert">
      <div class="risk-kicker">${esc(kicker[w.kind]||w.badge)}</div>
      <div>${esc(w.detail)}</div>
      ${showLink&&w.kind!=="quote"&&w.kind!=="low-confidence"?'<button class="risk-link" data-view="independence">See the evidence bases</button>':""}
    </div>`).join("");
}

function caseLabel(c){
  // CLI cases have a human id ("eggs"); portal questions have a generated hex id -- for those
  // show a short version of the question instead, so the chip is informative.
  const mid=c.kb.meta.id||"";
  if(/^[0-9a-f]{8,}$/i.test(mid)){
    const q=c.kb.meta.question||mid;
    return q.length>44?q.slice(0,42)+"…":q;
  }
  return mid;
}

    covEl.querySelector("#fEv").onchange=e=>{state.filter.ev=e.target.value;state.shown=24;renderMain();};
    covEl.querySelector("#fFu").onchange=e=>{state.filter.fu=e.target.value;state.shown=24;renderMain();};
    covEl.querySelector("#fFlag").onchange=e=>{state.filter.flagged=e.target.checked;state.shown=24;renderMain();};
  } else covEl.style.display="none";

  const caseSec=el("caseSec");
  if(links){
    caseSec.style.display="";
    const fmts=[["kb","knowledge base (JSON)"],["bibtex","BibTeX"],["ris","RIS"],["csl","CSL-JSON"]];
    const exportLinks=(links.export?fmts.map(([k,l])=>`<a href="${esc(links.export[k])}">${esc(l)}</a>`).join(""):"");
    el("caseLinks").innerHTML=
      (exportLinks?`<div class="lbl">Export</div>${exportLinks}`:"")+
      (links.manage?`<div class="lbl">Admin</div><a href="${esc(links.manage)}">Manage question</a>`:"");
  } else caseSec.style.display="none";
}

function filteredSources(kb){
  return kb.sources.filter(s=>{
    if(!state.posOn.has(s.position)) return false;
    if(state.filter.q){
      const q=state.filter.q.toLowerCase();
      if(!(s.title||"").toLowerCase().includes(q) && !(s.venue||"").toLowerCase().includes(q)) return false;
    }
    if(state.filter.ev && s.evidence!==state.filter.ev) return false;
    if(state.filter.fu && (s.funding||"Undisclosed")!==state.filter.fu) return false;
    if(state.filter.flagged){
      const pq=((s.provenance||{}).position)||{};
      if(!(pq.verifiedQuote==="missing" && s.textDepth==="full")) return false;
    }
    return true;
  });
}

function headline(c){
  const {kb,assessment:a}=c, {pos}=maps(kb);
  const warningBadges={};
  (a.warnings||[]).forEach(w=>(warningBadges[w.positionId]=warningBadges[w.positionId]||[]).push(w));
  // Always render every position so the bar keeps summing to 100% -- a deselected position
  // dims in place rather than being removed, which would silently re-derive percentages over
  // a smaller base. A length-aware heuristic decides whether the full label fits a segment,
  // falling back to just the percentage (full label always in the title= tooltip) so text
  // never spills into a neighbouring segment.
  const bar=(rows,pctKey,sizeKey,tipFn)=>rows.map(d=>{
    const label=(pos[d.id]&&pos[d.id].shortLabel)||shortLabel(d.label);
    const p=d[pctKey]||0;
    const fits=p>=(label.length*0.9+4);
    const text=fits?(label+" · "+p+"%"):(p+"%");
    const dim=state.posOn.has(d.id)?"":" dim";
    return `<button class="seg${dim}" data-pos="${d.id}" style="flex:${d[sizeKey]||0.0001};background:${d.hue}" title="${esc(tipFn(d))}">${esc(text)}</button>`;
  }).join("");
  const bar1=bar(a.distribution,"pct","count",d=>`${d.label} — ${d.count} sources`);
  const wd=a.weightedDistribution||[];
  const bar2=bar(wd,"pct","weight",d=>`${d.label} — ${d.raw} sources ≈ ${(d.weight||0).toFixed(1)} independent looks`);
  let takeaway="";
  if(wd.length){
    const rawById={}; a.distribution.forEach(d=>rawById[d.id]=d);
    let big=null;
    wd.forEach(w=>{const r=rawById[w.id]; if(!r)return; const drop=r.pct-w.pct;
      if(big===null||drop>big.drop) big={label:w.label,rawPct:r.pct,wPct:w.pct,drop};});
    takeaway = (big && big.drop>=5)
      ? `<div class="takeaway">Weighted by independence, <b>${esc(big.label)}</b> drops from <b>${big.rawPct}%</b> of sources to <b>${big.wPct}%</b> of the independent evidence — its support rests on fewer distinct datasets than the headcount implies.</div>`
      : `<div class="takeaway">The two views largely agree here — each position's evidence is about as independent as it is numerous.</div>`;
  }
  const warnHtml=warningsHtml(a.warnings, true);
  const legend=a.distribution.map(d=>{
    const badges=(warningBadges[d.id]||[]).map(w=>`<span class="riskbadge">${esc(w.badge)}</span>`).join("");
    return `<button class="key" data-pos="${d.id}"><span class="dot" style="background:${d.hue}"></span>${esc(d.label)} <span style="font-family:var(--mono);color:var(--faint)">(${d.count})</span>${badges}</button>`;
  }).join("");
  let skewHtml="";
  if(a.fundingSkew){
    const f=a.fundingSkew, parts=[];
    if(f.top) parts.push(`of ${f.n} interested-funding source${f.n===1?"":"s"} (industry/advocacy), the largest share back <b style="color:var(--ochre)">"${esc(f.top.label)}"</b>`);
    if(f.undisclosed) parts.push(`${f.undisclosed} of ${f.total} source${f.total===1?"":"s"} don't disclose funding`);
    if(parts.length) skewHtml=`<div class="skew"><span>⚠</span><span>${parts.join("; ")} — weigh before counting heads.</span></div>`;
  }
  return `<div class="panel">
      <div class="subnote">Two views of the same evidence: by <b>how many sources</b> take each side, then by <b>how much independent evidence</b> each side actually rests on.</div>
      <div class="splitlabel"><span class="num">1</span> By source count <span class="q">— the naïve tally · click a segment to isolate it</span></div>
      <div class="distrib">${bar1}</div>
      ${wd.length?`<div class="splitlabel"><span class="num">2</span> Weighted by independent evidence <span class="q">— sources sharing a dataset collapse into one “look”</span></div>
      <div class="distrib">${bar2}</div>
      ${takeaway}`:""}
      ${warnHtml}
      <div class="legend">${legend}</div>${skewHtml}
    </div>`;
}

function renderCoverageView(){
  const c=cur(), {kb,assessment:a}=c, {pos,ds}=maps(kb);
  let rows=filteredSources(kb).slice().sort((x,y)=>{
    const k=state.sort.key;
    let av=k==="p"?pos[x.position].label:x[{t:"title",y:"year",ev:"evidence",ds:"restsOn"}[k]||k];
    let bv=k==="p"?pos[y.position].label:y[{t:"title",y:"year",ev:"evidence",ds:"restsOn"}[k]||k];
    if(k==="ds"){av=(x.restsOn||[]).length;bv=(y.restsOn||[]).length;}
    if(k==="flag"){
      const fv=s=>{const pq=((s.provenance||{}).position)||{}; return (pq.verifiedQuote==="missing"&&s.textDepth==="full")?2:(s.textDepth==="full"?0:1);};
      av=fv(x);bv=fv(y);
    }
    if(typeof av==="string") return av.localeCompare(bv)*state.sort.dir;
    return ((av||0)-(bv||0))*state.sort.dir;
  });
  const total=rows.length, visible=rows.slice(0,state.shown);
  const active=[...state.posOn].length<kb.positions.length ? [...state.posOn] : null;
  const toolbar=`<div class="toolbar"><div class="count">${total} of ${kb.sources.length} sources shown</div>
    <div class="toggle"><button data-d="table" class="${state.display==="table"?"on":""}">Table</button><button data-d="cards" class="${state.display==="cards"?"on":""}">Cards</button></div></div>`;
  const maxVer=kb.meta.version;
  let body;
  if(state.display==="table"){
    const COLS=[["t","Title"],["y","Year"],["p","Position"],["ev","Evidence"],["ds","Datasets"],["flag","Flag"]];
    const thead=COLS.map(([k,l])=>`<th data-sort="${k}">${esc(l)}${state.sort.key===k?(state.sort.dir<0?" ↓":" ↑"):""}</th>`).join("");
    const trs=visible.map(s=>{
      const p=pos[s.position], open=state.expanded.has(s.id);
      const rests=(s.restsOn||[]).map(id=>ds[id]?ds[id].label:id);
      const dsLabel=rests.length?esc(rests[0])+(rests.length>1?" +"+(rests.length-1):""):"—";
      const pq=((s.provenance||{}).position)||{};
      const missing=pq.verifiedQuote==="missing"&&s.textDepth==="full";
      const icon=missing?'<i class="flagicon" title="quote not found in fetched text">⚠</i>':(s.textDepth==="full"?'<span class="okicon" title="full text">✓</span>':'<span class="okicon">·</span>');
      let detail="";
      if(open){
        const quote=cleanQuote(pq.quote,s.title);
        const st=strengthTier(s.evidence);
        const pip=st.n?`<span class="strength s${st.n}" title="${st.label} — by study design">${"●".repeat(st.n)}${"○".repeat(3-st.n)}</span>`:"";
        const isNew=s.addedIn&&s.addedIn===maxVer&&maxVer>1;
        const depthLabel={full:"full text",abstract:"abstract only",partial:"page text"}[s.textDepth];
        const venueBits=[];
        if(s.venue) venueBits.push(esc(s.venue));
        if(s.citations!=null) venueBits.push(`${esc(s.citations)} citation${s.citations===1?"":"s"}`);
        detail=`<tr class="detailrow"><td colspan="6">
            <div class="metarow">${venueBits.length?venueBits.join(" · ")+" · ":""}${esc(s.funding||"Undisclosed")} · conf: ${esc(s.confidence)}${depthLabel?" · "+esc(depthLabel):""}${pip}
              ${s.retracted?' <span class="tag retr">⚠ RETRACTED</span>':""}${isNew?` <span class="tag new">added v${s.addedIn}</span>`:""}</div>
            ${quote?`<div class="q">“${esc(quote)}”</div>${confBadge(pq.extractionConfidence,p.label)}${quoteWarnHtml(pq,s.textDepth)}`:""}
            ${rests.length?`<div>rests on: ${rests.map(esc).join(", ")}</div>`:""}
          </td></tr>`;
      }
      return `<tr class="rowmain" data-id="${esc(s.id)}">
          <td>${esc(s.title)}</td><td style="font-family:var(--mono);color:var(--muted);">${esc(s.year||"—")}</td>
          <td><span class="postag" style="background:${rgba(p.hue,.13)};color:${p.hue}">${esc(p.shortLabel||shortLabel(p.label))}</span></td>
          <td style="color:var(--muted);">${esc(s.evidence)}</td><td style="color:var(--muted);">${dsLabel}</td><td>${icon}</td>
        </tr>${detail}`;
    }).join("")||`<tr><td colspan="6" class="empty">No sources match these filters.</td></tr>`;
    const colgroup=`<colgroup><col style="width:35%"><col style="width:7%"><col style="width:15%"><col style="width:14%"><col style="width:21%"><col style="width:8%"></colgroup>`;
    body=`<div class="tbl-wrap"><table>${colgroup}<thead><tr>${thead}</tr></thead><tbody>${trs}</tbody></table></div>`;
  } else {
    body=`<div class="cards">${visible.map(s=>{
      const p=pos[s.position];
      const rests=(s.restsOn||[]).map(id=>`<span class="tag rests">↳ ${esc(ds[id]?ds[id].label:id)}</span>`).join("");
      const isNew=s.addedIn&&s.addedIn===maxVer&&maxVer>1;
      const st=strengthTier(s.evidence);
      const pip=st.n?`<span class="strength s${st.n}" title="${st.label} — by study design">${"●".repeat(st.n)}${"○".repeat(3-st.n)}</span>`:"";
      const venueBits=[];
      if(s.venue) venueBits.push(esc(s.venue));
      if(s.citations!=null) venueBits.push(`${esc(s.citations)} citation${s.citations===1?"":"s"}`);
      const venueLine=venueBits.length?`<div class="venue">${venueBits.join(" · ")}</div>`:"";
      const pq=((s.provenance||{}).position)||{};
      const quote=cleanQuote(pq.quote,s.title);
      const quoteBox=quote?`<div class="why"><span class="wl">Filed under “${esc(p.shortLabel||shortLabel(p.label))}” because</span><q>${esc(quote)}</q>${confBadge(pq.extractionConfidence,p.label)}${quoteWarnHtml(pq,s.textDepth)}</div>`:"";
      return `<div class="card${s.retracted?" retracted":""}" style="border-left-color:${p.hue}">
          <div class="ct"><div class="titlewrap"><span class="title">${s.url?`<a href="${esc(s.url)}" target="_blank" rel="noopener noreferrer">${esc(s.title)}</a>`:esc(s.title)}</span></div><span class="yr">${esc(s.year||"")}</span></div>
          ${venueLine}
          <div class="tags">
            <span class="tag" style="background:${rgba(p.hue,.13)};color:${p.hue}">${esc(p.shortLabel||shortLabel(p.label))}</span>
            ${s.retracted?'<span class="tag retr">⚠ RETRACTED</span>':""}
            <span class="tag">${esc(s.evidence)}${pip}</span>
            <span class="tag ${/industry|advocacy/i.test(s.funding||"")?"industry":(/undisclosed/i.test(s.funding||"undisclosed")?"rests":"")}">${esc(s.funding||"Undisclosed")}</span>
            ${s.population&&s.population!=="—"?`<span class="tag">${esc(s.population)}</span>`:""}
            ${isNew?`<span class="tag new">added v${s.addedIn}</span>`:""}
            ${rests}
          </div>
          ${quoteBox}
        </div>`;
    }).join("")}</div>`;
  }
  const more=total>state.shown?`<div class="showmore"><button id="showMore">Show ${Math.min(24,total-state.shown)} more of ${total-state.shown} remaining</button></div>`:"";

  const bsCards=(a.blindspots||[]).filter(p=>!active||active.includes(p.id)).map(p=>{
    const items=[];
    if(p.missingEvidence.length) items.push(`<li>never argues from <b>${p.missingEvidence.map(esc).join(", ")}</b></li>`);
    if(p.missingPop.length) items.push(`<li>doesn't address <b>${p.missingPop.map(esc).join(", ")}</b></li>`);
    if(!items.length) items.push(`<li style="color:var(--faint)">covers every evidence type & subgroup present</li>`);
    return `<div class="bs"><div class="bs-h"><span class="dot" style="width:10px;height:10px;border-radius:3px;background:${p.hue}"></span>${esc(p.label)} skips</div><ul>${items.join("")}</ul></div>`;
  }).join("");

  el("main").innerHTML=`<h1>Coverage & warnings</h1><div class="mmeta">who holds which position, and what to watch for</div>`
    +headline(c)
    +`<div class="panel">${toolbar}${body}${more}</div>`
    +`<div class="panel"><h1 style="font-size:14px;margin:0 0 4px;">Blindspots — what each side leaves out</h1><div class="mmeta" style="margin-bottom:14px;">evidence types & subgroups present in the case but absent from a position's own sources</div><div class="bs-grid">${bsCards}</div></div>`;

  if(state.display==="table"){
    el("main").querySelectorAll("[data-sort]").forEach(th=>th.onclick=()=>{
      const k=th.getAttribute("data-sort");
      if(state.sort.key===k) state.sort.dir*=-1; else state.sort={key:k,dir:1};
      renderMain();
    });
    el("main").querySelectorAll(".rowmain").forEach(tr=>tr.onclick=()=>{
      const id=tr.getAttribute("data-id");
      if(state.expanded.has(id)) state.expanded.delete(id); else state.expanded.add(id);
      renderMain();
    });
  }
  el("main").querySelectorAll("[data-d]").forEach(b=>b.onclick=()=>{state.display=b.getAttribute("data-d");renderMain();});
  const sm=el("main").querySelector("#showMore"); if(sm) sm.onclick=()=>{state.shown+=24;renderMain();};
}

function renderDivergenceView(){
  const c=cur(), {kb,assessment:a}=c;
  const cruxBy={}; (a.cruxes||[]).forEach(x=>cruxBy[x.id]=x);
  const info=f=>cruxBy[f.id]||{spread:0,isCrux:false,engaged:0};
  const activePos=kb.positions.filter(p=>state.posOn.has(p.id));
  const rank=z=>z.isCrux?0:(z.engaged>=2?1:2);
  const ordered=kb.factors.slice().sort((x,y)=>{const ix=info(x),iy=info(y);
    return rank(ix)-rank(iy) || iy.spread-ix.spread || iy.engaged-ix.engaged;});
  const posColW=Math.min(20,Math.floor(60/Math.max(1,activePos.length)));
  const colgroup=`<colgroup><col style="width:${100-posColW*activePos.length}%">${activePos.map(()=>`<col style="width:${posColW}%">`).join("")}</colgroup>`;
  const head=`<th class="nosort">Factor</th>`+activePos.map(p=>`<th class="nosort" style="background:${p.hue};color:#fff;text-align:center;" title="${esc(p.label)}">${esc(p.shortLabel||shortLabel(p.label))}</th>`).join("");
  const rows=ordered.map(f=>{
    const cx=info(f), one=cx.engaged<2;
    const cells=activePos.map(p=>{
      const w=f.weights[p.id]||"—"; const v=WV[WLABEL[w]!==undefined?w:""]||WV[w]||0;
      const bg=WCELL[v], txt=v===3?"#fff":(v?"var(--ink)":"var(--faint)");
      return `<td style="text-align:center;background:${bg};color:${txt};font-family:var(--mono);font-weight:600;white-space:nowrap;">${w&&w!=="n/a"?esc(WLABEL[w]||w):"—"}</td>`;
    }).join("");
    const open=state.expanded.has("f"+f.id);
    const detail=open?`<tr class="detailrow"><td colspan="${activePos.length+1}">${esc(f.rationale||"No rationale recorded.")}</td></tr>`:"";
    const tag=cx.isCrux?' <span class="cruxbadge">CRUX</span>':(one?' <span class="onetag">one side only</span>':"");
    return `<tr class="rowmain${one?" onesided":""}" data-fid="${esc(f.id)}">
        <td class="wrap" style="${cx.isCrux?"font-weight:600;":"color:var(--muted);"}">${esc(f.label)}${tag}</td>
        ${cells}
      </tr>${detail}`;
  }).join("");
  const nCrux=(a.cruxes||[]).filter(x=>x.isCrux).length;
  const nOne=(a.cruxes||[]).filter(x=>x.engaged<2).length;
  const nShared=(a.cruxes||[]).length-nCrux-nOne;
  el("main").innerHTML=`<h1>Divergence matrix</h1><div class="mmeta">where the disagreement actually lives</div>
    <div class="panel">
      <div class="subnote">Each cell is how heavily that camp weighs that factor. A <b>crux</b> (bold row) is a factor the camps weigh very differently — that is where the real disagreement is; dimmed rows are dimensions only one camp engages, not points of disagreement. Click a row for the rationale.</div>
      <div class="wkey">weight: <span class="ws" style="background:#dce6f0">low</span><span class="ws" style="background:#7fa8ce">med</span><span class="ws" style="background:#2f6296;color:#fff">high</span><span class="ws" style="border-style:dashed;color:var(--faint)">— not weighed</span></div>
      <div class="tbl-wrap"><table>${colgroup}<thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>
      <p style="font-size:13px;color:var(--muted);margin:14px 0 0"><b>${nCrux} crux${nCrux===1?"":"es"}</b> of ${kb.factors.length} factors · ${nShared} shared · ${nOne} raised by one side.</p>
    </div>`;
  el("main").querySelectorAll(".rowmain").forEach(tr=>tr.onclick=()=>{
    const k="f"+tr.getAttribute("data-fid");
    if(state.expanded.has(k)) state.expanded.delete(k); else state.expanded.add(k);
    renderMain();
  });
}

function renderIndependenceView(){
  const c=cur(), {kb,assessment:a}=c;
  const KIND={dataset:{lab:"primary dataset",col:"#222a35"},
              primary:{lab:"own observation",col:"#222a35"},
              secondary:{lab:"secondary voice",col:"#c4ccd4"},
              cycle:{lab:"circular loop",icon:"⚠"}};
  const methodByPos={}; (a.methodAudit||[]).forEach(m=>methodByPos[m.id]=m);
  const activePos=(a.independence||[]).filter(p=>state.posOn.has(p.id));
  const sections=activePos.map(p=>{
    const list=(p.bases||[]);
    const shownN=state.expandedBases[p.id]?list.length:Math.min(6,list.length);
    const shown=list.slice(0,shownN);
    const rows=shown.map(b=>{
      const k=KIND[b.kind]||KIND.dataset;
      const notes=[];
      if(b.secondaryOnly) notes.push("via review only");
      if(b.nonHuman) notes.push("animal / in-vitro");
      return `<tr><td>${esc(b.label)}</td><td style="color:var(--muted);white-space:nowrap;">${esc(k.lab)}</td>
        <td style="font-family:var(--mono);text-align:right;">${b.weight}</td><td style="color:var(--faint);">${esc(notes.join(", ")||"—")}</td></tr>`;
    }).join("");
    const more=list.length>6?`<div class="showmore"><button data-more="${p.id}">${state.expandedBases[p.id]?"Show fewer":"Show "+(list.length-6)+" more"}</button></div>`:"";
    const sec=p.collapsedSecondary>1?`<div class="ind-note">${p.collapsedSecondary} secondary sources (reviews / commentary / statements) counted as <b>one</b> voice — echo doesn't add independence.</div>`:"";
    const circ=(p.circular&&p.circular.length)?`<div class="ind-note warn">⚠ circular corroboration — ${p.circular.length} citation loop${p.circular.length>1?"s":""} that bottom out in no primary evidence.</div>`:"";
    let method="";
    const ma=methodByPos[p.id];
    if(ma&&ma.top){
      const allShare=pct(ma.top.count/(ma.raw||1));
      const grouped=ma.classed===ma.raw
        ?"Every source in this position has a recognizable method-risk family."
        :`This simple check recognized method-risk families for ${ma.classed} of ${ma.raw} sources; the rest are secondary evidence or designs it does not group.`;
      const status=ma.monoculture
        ?"Warning: this is enough of the position to suggest a shared blind spot. It does not change the independent-bases count."
        :"This is below the position-wide warning threshold and does not change the independent-bases count.";
      method=`<div class="ind-note${ma.monoculture?" warn":""}">Method-bias check: ${ma.top.count} of ${ma.raw} sources fall into the same method-risk family: <b>${esc(ma.top.label)}</b> (${allShare} of all sources). ${grouped} ${status}</div>`;
    }
    return `<div class="indpos">
        <div class="ph"><span style="width:9px;height:9px;border-radius:2px;background:${p.hue};display:inline-block;"></span>
          <span class="plabel">${esc(p.label)}</span>
          <span class="peff">${p.nEff.toFixed(1)} independent base${p.nEff.toFixed(1)==="1.0"?"":"s"} from ${p.raw} source${p.raw===1?"":"s"}
            <span class="infoicon" title="Effective count of distinct evidentiary roots (datasets, own primary observations, one collapsed secondary-review voice, one collapsed circular-citation loop), computed as a Herfindahl numbers-equivalent over each root's share of this position's sources. Sharing a dataset, echoing as a review, or citing in a loop all shrink this number toward 1 -- it can never exceed the raw source count.">?</span>
          </span></div>
        <div class="tbl-wrap"><table><colgroup><col style="width:46%"><col style="width:16%"><col style="width:12%"><col style="width:26%"></colgroup><thead><tr><th class="nosort">Base</th><th class="nosort">Kind</th><th class="nosort" style="text-align:right;">Weight <span class="infoicon" title="How much this root counts toward the independent-bases number: 1 per source normally, halved (0.5x) if the dataset is only known through a secondary review rather than a primary source citing it directly, and halved again if every source resting on it is an animal or in-vitro study.">?</span></th><th class="nosort">Notes</th></tr></thead><tbody>${rows}</tbody></table>${more}</div>
        ${sec}${circ}${method}
      </div>`;
  }).join("");
  const flag=(a.warnings&&a.warnings.length) ? warningsHtml(a.warnings, false)
    : `<div class="flagbox"><span>No single dataset dominates a position — and review echo / circular citation are already collapsed below, so the bases shown are genuinely distinct.</span></div>`;
  el("main").innerHTML=`<h1>Independence & bias</h1><div class="mmeta">is the consensus real, or the same evidence counted twice?</div>
    <div class="panel">
      <div class="subnote">Each position is reduced to its <b>independent evidence bases</b>: sources sharing a dataset, echoing as reviews, or citing each other in a loop collapse into one. Bases are pre-sorted by weight, so the ones that matter are always visible without expanding.</div>
      <div class="indkey"><span><i style="background:#222a35"></i>primary evidence (dataset / own data)</span><span><i style="background:#c4ccd4"></i>secondary voice (collapsed echo)</span><span><b class="warn">⚠</b> circular loop</span></div>
      ${sections}${flag}
    </div>`;
  el("main").querySelectorAll("[data-more]").forEach(b=>b.onclick=()=>{
    const k=b.getAttribute("data-more"); state.expandedBases[k]=!state.expandedBases[k]; renderMain();
  });
}

// "distribution: <position label> 41 -> 42" / "concentration: <position label> 45% -> 44%"
function parseDiffLine(kb,line){
  const m=line.match(/^(\w[\w -]*):\s*(.+?)\s+([\d.]+%?)\s*→\s*([\d.]+%?)$/);
  if(!m) return null;
  const [,metric,label,before,after]=m;
  const pos=kb.positions.find(p=>p.label===label||p.shortLabel===label);
  return {metric,before,after,hue:pos?pos.hue:"var(--faint)",label:pos?(pos.shortLabel||shortLabel(pos.label)):label,warn:line.indexOf("⚠")===0};
}
function deltaBadges(kb,diff){
  const parsed=(diff||[]).map(l=>parseDiffLine(kb,l)).filter(Boolean);
  if(!parsed.length) return (diff&&diff.length)?esc(diff[0]):`<span style="color:var(--faint)">(no metric changes)</span>`;
  const shown=parsed.slice(0,2).map(d=>
    `<span class="deltapill"><span class="dot" style="background:${d.hue}"></span>${esc(d.metric)} ${esc(d.before)}→${esc(d.after)}</span>`).join("");
  const more=parsed.length>2?`<span class="deltamore">+${parsed.length-2}</span>`:"";
  return shown+more;
}
// Curation actions (merge-position / dedupe-sources / tidy / ...) share one shape --
// {action, summary} with no title/source/diff -- distinct from a seed and from a normal
// add-source entry. Anything with a summary and no diff array falls in this bucket, so a
// future curation command needs no viewer change to show up here (same "generic over kind"
// discipline as warningsHtml).
const CURATION_LABEL={"merge-position":"merged positions","dedupe-sources":"de-duplicated sources","tidy":"tidied labels"};
function renderChangesView(){
  const c=cur(), kb=c.kb, log=(kb.log||[]).slice().reverse();
  const posLabel=id=>{const p=kb.positions.find(x=>x.id===id); return p?(p.shortLabel||p.label):id;};
  const rows=log.map(e=>{
    const key="v"+e.version+"-"+(e.action||"");
    const open=state.expandedChanges.has(key);
    const isSeed=e.action==="seed";
    const isCuration=!isSeed && e.summary!=null && e.diff==null;
    let title, badges, detailBody;
    if(isSeed){
      title=`(seed) ${e.sources||kb.sources.length} sources established the initial knowledge base`;
      badges=`<span class="deltapill"><span class="dot" style="background:var(--chrome)"></span>seeded · ${e.sources||kb.sources.length} sources</span>`;
      detailBody=`${esc(e.sources||kb.sources.length)} sources established the initial knowledge base.`;
    } else if(isCuration){
      const label=CURATION_LABEL[e.action]||e.action||"curation";
      title=`${label} — ${e.summary}`;
      badges=`<span class="deltapill"><span class="dot" style="background:var(--faint)"></span>${esc(label)}</span>`;
      detailBody=esc(e.summary);
    } else {
      title=`added “${e.title||e.source||""}”`;
      const dsB=(e.newDatasets&&e.newDatasets.length)?`<span class="deltapill"><span class="dot" style="background:var(--flag)"></span>+${e.newDatasets.length} new dataset${e.newDatasets.length===1?"":"s"}</span>`:"";
      const posB=(e.newPositions&&e.newPositions.length)?`<span class="deltapill"><span class="dot" style="background:var(--ochre)"></span>+${e.newPositions.length} new position${e.newPositions.length===1?"":"s"}</span>`:"";
      badges=deltaBadges(kb,e.diff)+dsB+posB;
      detailBody=((e.diff&&e.diff.length)?e.diff.map(d=>`<div>${esc(d)}</div>`).join(""):`<div style="color:var(--faint)">(no metric changes)</div>`)
        + (e.newDatasets&&e.newDatasets.length?`<div>new dataset(s): ${e.newDatasets.map(esc).join(", ")}</div>`:"")
        + (e.newPositions&&e.newPositions.length?`<div>new position(s): ${e.newPositions.map(id=>esc(posLabel(id))).join(", ")}</div>`:"");
    }
    const detail=open?`<tr class="detailrow"><td colspan="4">${detailBody}</td></tr>`:"";
    return `<tr class="rowmain" data-key="${esc(key)}"><td style="font-family:var(--mono);color:var(--muted);white-space:nowrap;">v${e.version}</td>
        <td style="color:var(--faint);white-space:nowrap;">${esc(e.ts||"")}</td>
        <td><div class="clamp2">${esc(title)}</div></td>
        <td><div class="deltawrap">${badges}</div></td></tr>${detail}`;
  }).join("");
  const colgroup=`<colgroup><col style="width:9%"><col style="width:14%"><col style="width:51%"><col style="width:26%"></colgroup>`;
  el("main").innerHTML=`<h1>Changes</h1><div class="mmeta">how the picture changed as evidence arrived — newest first</div>
    <div class="panel">${rows?`<div class="tbl-wrap"><table>${colgroup}<thead><tr><th class="nosort">Version</th><th class="nosort">Date</th><th class="nosort">Source added</th><th class="nosort">Key change</th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="empty">No history yet — only the seed.</div>'}</div>`;
  el("main").querySelectorAll(".rowmain").forEach(tr=>tr.onclick=()=>{
    const k=tr.getAttribute("data-key");
    if(state.expandedChanges.has(k)) state.expandedChanges.delete(k); else state.expandedChanges.add(k);
    renderMain();
  });
}

function renderEmpty(){
  const links=DATA.portalLinks;
  const action=(links&&links.add)?`<a class="empty-action" href="${esc(links.add)}">Add the first source</a>`:"";
  el("main").innerHTML=`<div class="panel empty-state">
    <div class="mark">∅</div>
    <h2>No sources yet</h2>
    <p>This question is ready, but no evidence has been added. Add the first source to build its coverage, divergence, and independence views.</p>
    ${action}
  </div>`;
}

function renderMain(){
  renderChrome();
  if(!DATA){el("main").innerHTML='<div class="empty">No data baked in. Run <b>python cli.py build cases/eggs.kb.json cases/covid.kb.json</b> and open the generated <b>viewer/index.html</b>.</div>';return;}
  const kb=cur().kb;
  if(kb.sources.length===0){renderEmpty();return;}
  if(state.view==="coverage") renderCoverageView();
  else if(state.view==="divergence") renderDivergenceView();
  else if(state.view==="independence") renderIndependenceView();
  else renderChangesView();
}

function switchCase(id){
  state.caseId=id;
  state.posOn=new Set(cur().kb.positions.map(p=>p.id));
  state.shown=24; state.filter={q:"",ev:"",fu:"",flagged:false};
  state.expanded=new Set(); state.expandedBases={}; state.expandedChanges=new Set();
}
if(DATA) switchCase(state.caseId);

document.addEventListener("click",e=>{
  const cs=e.target.closest("[data-case]"); if(cs){switchCase(cs.getAttribute("data-case"));renderMain();return;}
  const nv=e.target.closest("[data-view]"); if(nv){state.view=nv.getAttribute("data-view");state.shown=24;renderMain();return;}
  const pc=e.target.closest("[data-pos]"); if(pc){
    const id=pc.getAttribute("data-pos");
    if(state.posOn.has(id)) state.posOn.delete(id); else state.posOn.add(id);
    renderMain(); return;
  }
  const wj=e.target.closest("[data-jump]"); if(wj){state.view=wj.getAttribute("data-jump");renderMain();return;}
});
renderMain();
</script>
</body>

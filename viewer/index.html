<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ground Knowledge — research disputes, mapped</title>
<style>
  :root{
    --bg:#F5F6F7; --surface:#FFFFFF; --ink:#15171B; --muted:#61676E; --faint:#8A9098;
    --line:#E4E7EA; --line-strong:#CDD2D7; --chrome:#1B1D24;
    --ochre:#8a6510; --ochre-bg:#F5ECD6; --flag:#2f6296; --flag-bg:#E7EEF6;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
    --sans:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    --rail-w:270px;
  }
  *{box-sizing:border-box;} html,body{margin:0;}
  /* Reserve the scrollbar gutter unconditionally -- otherwise a short tab (e.g. Divergence,
     which rarely needs to scroll) renders ~15px wider than a long one, and the whole centered
     .shell (and the rail's divider with it) visibly shifts/narrows switching between tabs. */
  html{overflow-y:scroll;scrollbar-gutter:stable;}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.55;
    -webkit-font-smoothing:antialiased;font-size:15px;}
  a{color:var(--flag);text-decoration:none;cursor:pointer;} a:hover{text-decoration:underline;}
  button{cursor:pointer;}

  /* ---------- shell / rail ---------- */
  .shell{display:flex;max-width:1440px;margin:0 auto;min-height:100vh;}
  /* Deliberately NOT sticky and NOT independently scrollable -- a pinned header sitting above
     content that has already scrolled away reads as broken, and an internal overflow-y:auto
     reads as a stray scrollbar (both tried, both rejected). The rail is just a normal column
     that scrolls with the page like the rest of it. */
  /* No align-self:flex-start -- the row's default stretch keeps the rail's box (and its
     border-right) as tall as .main, so the divider runs the full length of the page even
     though the rail's own content is much shorter. */
  .rail{width:var(--rail-w);flex:0 0 var(--rail-w);border-right:1px solid var(--line);
    padding:22px 18px;}
  .backhome{display:inline-block;font-size:12px;color:var(--muted);margin-bottom:12px;}
  .backhome:hover{color:var(--flag);}
  .brand{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);
    font-family:var(--mono);margin-bottom:8px;}
  .qtitle{font-size:15px;font-weight:600;line-height:1.4;margin-bottom:4px;}
  /* Same shape language as the "+ Add source" control (.addsrc): 8px radius + a hairline border,
     not a lozenge. */
  .qbadge{display:none;align-items:center;gap:7px;font-size:11px;font-weight:600;
    color:var(--flag);background:var(--flag-bg);border:1px solid var(--flag);border-radius:8px;
    padding:4px 9px;margin:3px 0 10px;width:fit-content;cursor:help;}
  .qbadge .qb-dot{opacity:.4;font-weight:400;}
  .qbadge .qb-pct{font-weight:500;opacity:.85;}
  .qmeta{font-family:var(--mono);font-size:11px;color:var(--faint);margin-bottom:18px;}
  .casesec{margin-bottom:14px;display:flex;flex-direction:column;gap:5px;}
  .cchip{display:block;width:100%;text-align:left;font:inherit;font-size:12px;color:var(--muted);
    background:transparent;border:1px solid transparent;border-radius:7px;padding:6px 8px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .cchip:hover{background:#EEF0F1;}
  .cchip[aria-pressed="true"]{background:var(--flag-bg);color:var(--flag);font-weight:600;
    border-color:var(--flag-bg);}
  nav#nav{margin-bottom:6px;}
  .navitem{display:flex;flex-direction:column;padding:8px 10px;border-radius:8px;cursor:pointer;
    margin-bottom:2px;border:0;background:transparent;font:inherit;text-align:left;width:100%;}
  .navitem:hover{background:#EEF0F1;}
  .navitem[aria-selected="true"]{background:var(--flag-bg);}
  .navitem .l{font-size:13.5px;color:var(--muted);}
  .navitem[aria-selected="true"] .l{color:var(--flag);font-weight:600;}
  .addsrc{display:block;text-align:center;width:100%;font:inherit;font-size:13px;font-weight:600;
    padding:9px 0;margin:6px 0 6px;border:1px solid var(--flag);border-radius:8px;
    background:var(--flag-bg);color:var(--flag);cursor:pointer;}
  .addsrc:hover{background:var(--flag);color:#fff;text-decoration:none;}
  .railsec{border-top:1px solid var(--line);margin-top:16px;padding-top:14px;}
  .railsec h4{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);
    margin:0 0 10px;font-weight:600;}
  .poschip{display:flex;align-items:center;gap:8px;padding:6px 4px;font-size:13px;color:var(--muted);
    cursor:pointer;border-radius:6px;}
  .poschip:hover{background:#EEF0F1;}
  .poschip .dot{width:9px;height:9px;border-radius:2px;flex:0 0 auto;}
  .poschip .lab{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .poschip .risk{color:var(--ochre);font-size:11px;flex:0 0 auto;}
  .poschip .n{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint);
    flex:0 0 auto;}
  .poschip.off{opacity:.4;}
  input[type=text],select{width:100%;font:inherit;font-size:12.5px;padding:7px 9px;
    border:1px solid var(--line-strong);border-radius:7px;background:var(--surface);
    color:var(--ink);margin-bottom:8px;}
  select{appearance:none;-webkit-appearance:none;-moz-appearance:none;padding-right:26px;
    background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><path d="M4 6l4 4 4-4" fill="none" stroke="%2361676E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>');
    background-repeat:no-repeat;background-position:right 8px center;cursor:pointer;}
  select:hover{border-color:var(--faint);}
  input[type=text]:focus,select:focus{outline:none;border-color:var(--flag);
    box-shadow:0 0 0 2px var(--flag-bg);}
  label.flagonly{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--muted);
    cursor:pointer;margin-top:6px;}
  label.flagonly input{width:auto;margin:0;}
  /* Filter sources lives with the table/cards it filters (Coverage panel), not in the rail --
     it's only ever relevant there, and a horizontal bar reads better with the extra width. */
  .filterbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
  .filterbar input[type=text]{flex:1 1 220px;margin-bottom:0;}
  .filterbar select{width:auto;flex:0 0 auto;margin-bottom:0;}
  .filterbar label.flagonly{margin-top:0;flex:0 0 auto;white-space:nowrap;}
  .warnmini{border:1px solid #E3CD99;background:var(--ochre-bg);border-radius:7px;padding:8px 10px;
    font-size:11.5px;color:var(--ink);margin-bottom:8px;cursor:pointer;}
  .warnmini b{color:var(--ochre);display:block;font-size:10px;text-transform:uppercase;
    letter-spacing:.04em;margin-bottom:2px;}
  .caselinks{display:flex;flex-direction:column;gap:3px;}
  .caselinks .lbl{font-size:10.5px;color:var(--faint);text-transform:uppercase;letter-spacing:.04em;
    margin:8px 0 2px;}
  .caselinks .lbl:first-child{margin-top:0;}
  .caselinks a{font-size:12.5px;color:var(--muted);}
  .caselinks a:hover{color:var(--flag);}
  /* Collapsed by default -- export/admin are occasional actions, not something worth a
     permanently-open block of space in the rail. */
  #caseSec summary{font-size:11px;letter-spacing:.05em;text-transform:uppercase;
    color:var(--faint);font-weight:600;cursor:pointer;list-style:none;}
  #caseSec summary::-webkit-details-marker{display:none;}
  #caseSec summary::after{content:"▾";float:right;color:var(--faint);}
  #caseSec[open] summary::after{content:"▴";}
  #caseSec .caselinks{margin-top:10px;}

  /* ---------- main ---------- */
  .main{flex:1;min-width:0;padding:26px 32px 60px;}
  .main h1{font-size:20px;font-weight:600;margin:0 0 4px;}
  .mmeta{font-family:var(--mono);font-size:12px;color:var(--faint);margin-bottom:20px;}
  .panel{background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:18px 20px;margin-bottom:16px;}
  .subnote{color:var(--muted);font-size:13px;margin:0 0 14px;line-height:1.5;}
  .splitlabel{font-size:13px;font-weight:600;color:var(--ink);margin:16px 0 7px;display:flex;
    align-items:baseline;gap:8px;flex-wrap:wrap;}
  .splitlabel:first-child{margin-top:0;}
  .splitlabel .num{font-family:var(--mono);color:var(--faint);font-weight:400;}
  .splitlabel .q{font-weight:400;color:var(--faint);font-size:12px;}
  .distrib{display:flex;height:36px;border-radius:8px;overflow:hidden;border:1px solid var(--line);}
  .seg{display:flex;align-items:center;justify-content:center;font-size:11.5px;font-family:var(--mono);
    color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:opacity .15s,filter .12s;
    min-width:0;padding:0 8px;border:0;background:transparent;}
  .seg:hover{filter:brightness(1.1);box-shadow:inset 0 0 0 2px rgba(255,255,255,.5);}
  .seg.dim{opacity:.32;}
  /* Type scale for this panel is a deliberate 3 steps: 14 panel title / 13 section+row labels /
     12 everything else (body, notes, warnings, buttons). No half-point sizes, one muted body tone. */
  .cmphead{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  .cmphead b{font-size:14px;font-weight:600;letter-spacing:-.01em;}
  .cmphead span{font-size:12px;color:var(--muted);}
  .compact-summary .distrib{height:30px;}
  .compact-summary .splitlabel{margin:14px 0 7px;}
  .compact-summary .splitlabel:first-of-type{margin-top:0;}
  .compact-summary .indrow{padding:4px 0;}
  .cmpinsight{margin:11px 0 0;padding-top:11px;border-top:1px solid var(--line);font-size:12px;
    color:var(--muted);line-height:1.5;}
  .cmphelp{margin-top:8px;font-size:12px;color:var(--muted);}
  .cmphelp summary{cursor:pointer;color:var(--faint);}
  .cmphelp div{margin-top:8px;line-height:1.55;}
  .cmphelp .risk-link{margin:0 0 0 6px;padding:3px 9px;}
  .takeaway{font-size:13.5px;background:var(--flag-bg);border-left:3px solid var(--flag);
    border-radius:0 8px 8px 0;padding:10px 14px;margin:14px 0 2px;}
  .method-alert{background:var(--ochre-bg);border:1px solid #E3CD99;border-left:4px solid var(--ochre);
    border-radius:0 9px 9px 0;padding:12px 14px;margin:14px 0 2px;font-size:13px;line-height:1.5;}
  .method-alert .risk-kicker{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;
    text-transform:uppercase;color:var(--ochre);font-weight:700;margin-bottom:3px;}
  .risk-link{appearance:none;border:1px solid #D5B873;background:#fff;color:var(--ochre);
    border-radius:6px;padding:5px 9px;margin-top:9px;font:inherit;font-size:12px;cursor:pointer;}
  .risk-link:hover{background:#FFF8E8;}
  .warn-src{background:#fff;border:1px solid #E3CD99;border-radius:7px;padding:7px 10px;
    margin:7px 0 0;font-size:12.5px;line-height:1.45;}
  .warnlines{margin-top:14px;border-top:1px solid var(--line);padding-top:4px;}
  .warnline{display:grid;grid-template-columns:auto minmax(0,1fr) auto;align-items:center;gap:10px;
    padding:8px 3px;font-size:12px;color:var(--muted);line-height:1.4;}
  .warnline+.warnline{border-top:1px solid var(--line);}
  .warnline .warnmark{color:var(--ochre);font-size:12px;}
  .warnline b{color:var(--ink);font-weight:600;}
  .warnline .risk-link{margin:0;padding:4px 10px;white-space:nowrap;}
  .legend{display:flex;flex-wrap:wrap;gap:14px;margin-top:14px;font-size:12.5px;color:var(--muted);}
  .legend .key{display:inline-flex;flex-wrap:wrap;align-items:center;gap:7px;cursor:pointer;
    transition:color .12s;border:0;background:transparent;font:inherit;padding:0;
    text-align:left;max-width:100%;row-gap:2px;}
  .legend .key:hover{color:var(--ink);text-decoration:underline;}
  .legend .dot{width:11px;height:11px;border-radius:3px;display:inline-block;}
  .riskbadge{font-family:var(--mono);font-size:10px;color:var(--ochre);background:var(--ochre-bg);
    border:1px solid #E3CD99;border-radius:5px;padding:1px 6px;white-space:nowrap;}
  .skew{font-family:var(--mono);font-size:12px;color:var(--ochre);background:var(--ochre-bg);
    border-radius:8px;padding:9px 12px;margin-top:14px;display:flex;gap:8px;align-items:flex-start;}
  .toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;
    flex-wrap:wrap;gap:8px;}
  .toolbar .count{font-size:12px;color:var(--muted);}
  .toggle{display:inline-flex;border:1px solid var(--line-strong);border-radius:7px;overflow:hidden;}
  .toggle button{border:0;background:transparent;font:inherit;font-size:11.5px;padding:6px 13px;
    cursor:pointer;color:var(--muted);}
  .toggle button.on{background:var(--chrome);color:#fff;}
  .toggle button+button{border-left:1px solid var(--line-strong);}
  table{width:100%;border-collapse:collapse;table-layout:fixed;}
  th{text-align:left;padding:8px 10px;font-size:10.5px;font-weight:600;color:var(--faint);
    text-transform:uppercase;letter-spacing:.03em;border-bottom:1px solid var(--line);cursor:pointer;
    white-space:nowrap;background:#FAFBFB;overflow:hidden;text-overflow:ellipsis;}
  th.nosort{cursor:default;}
  td{padding:8px 10px;font-size:12.5px;border-bottom:1px solid var(--line);vertical-align:top;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  td.wrap{white-space:normal;}
  /* the evidence table has two-word numeric headers ("Sources using it", "Counts as")
     that would ellipsis-truncate in a fixed-layout column; let its headers wrap and bottom-align. */
  .covtbl th{white-space:normal;vertical-align:bottom;line-height:1.25;}
  /* Line-clamping needs display:-webkit-box, which breaks a <td>'s table-cell layout if
     applied directly to it (collapses column widths / row heights) -- so this only ever
     goes on a <div> nested inside the cell, never the cell itself. */
  .clamp2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
    overflow:hidden;white-space:normal;}
  tbody tr.rowmain{cursor:pointer;}
  tbody tr.rowmain:hover td{background:#FAFBFB;}
  tr.onesided td{opacity:.55;}
  /* overflow-x:auto (not hidden) -- a fixed-layout table's columns can still get too narrow
     for their content at small viewports (e.g. a single delta pill on the Changes tab), so
     the table scrolls within its own box instead of overflowing the page. */
  .tbl-wrap{border:1px solid var(--line);border-radius:9px;overflow-x:auto;}
  .postag{font-size:10.5px;padding:2px 8px;border-radius:5px;white-space:nowrap;}
  .flagicon{color:var(--ochre);} .okicon{color:var(--faint);}
  .detailrow td{background:#FAFBFB;padding:12px 14px 14px 16px;font-size:12px;color:var(--muted);
    white-space:normal;}
  .detailrow .metarow{margin-bottom:6px;}
  .detailrow .q{font-style:italic;color:var(--ink);margin:6px 0;}
  .why{margin-top:8px;padding:9px 11px;border-left:3px solid var(--line-strong);background:var(--bg);
    border-radius:0 7px 7px 0;font-size:12px;line-height:1.5;color:var(--muted);}
  .why .wl{display:block;font-family:var(--mono);font-size:10px;letter-spacing:.04em;
    text-transform:uppercase;color:var(--faint);margin-bottom:3px;}
  .why q{color:var(--ink);font-style:italic;quotes:"\201C" "\201D";}
  .conf{display:block;margin-top:7px;font-family:var(--mono);font-size:10px;color:var(--faint);
    cursor:help;}
  .conf.low{color:var(--ochre);}
  .showmore{text-align:center;padding:12px;}
  .showmore button{font:inherit;font-size:12px;padding:7px 16px;border:1px solid var(--line-strong);
    border-radius:7px;background:var(--surface);cursor:pointer;color:var(--muted);}
  .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;}
  .card{border:1px solid var(--line);border-left:3px solid var(--line-strong);border-radius:10px;
    padding:13px 15px;background:var(--surface);}
  .card.retracted{background:#FCF3F1;border-color:#E6C3BA;}
  .card .ct{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .card .titlewrap{min-width:0;flex:1 1 auto;}
  .card .title{font-size:13.5px;font-weight:600;line-height:1.4;overflow-wrap:anywhere;}
  .card .yr{font-family:var(--mono);font-size:10.5px;color:var(--faint);white-space:nowrap;}
  .card .venue{font-size:11.5px;color:var(--faint);margin:3px 0 9px;
    overflow-wrap:anywhere;}
  .card .tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:2px;}
  /* Not nowrap: population strings and "rests on" dataset labels are free text (sometimes a
     full descriptive phrase, sometimes a raw un-humanized id with no spaces at all) and can
     run longer than a card is wide -- wrap, and force-break inside a single long token,
     instead of overflowing past the card's edge. */
  .tag{font-family:var(--mono);font-size:10.5px;padding:2px 7px;border-radius:5px;
    background:#F1F3F4;color:var(--muted);white-space:normal;overflow-wrap:anywhere;
    max-width:100%;}
  .tag.industry{background:var(--ochre-bg);color:var(--ochre);}
  .tag.rests{background:#EFF1F2;color:var(--faint);}
  .tag.new{background:var(--flag-bg);color:var(--flag);}
  .tag.retr{background:#F6E0DB;color:#B4502E;font-weight:600;}
  .strength{margin-left:3px;letter-spacing:1px;font-size:9px;vertical-align:middle;}
  .strength.s3{color:#2E8B6F;} .strength.s2{color:#8a6510;} .strength.s1{color:var(--faint);}
  .factor{border:1px dashed var(--line-strong);border-radius:10px;padding:11px 16px;
    margin-bottom:8px;opacity:.75;}
  .factor.crux{border:1px solid var(--line);border-left:3px solid var(--flag);padding:13px 16px;
    margin-bottom:10px;opacity:1;}
  .factor.shared{opacity:1;}
  .factor .fh{display:flex;align-items:baseline;gap:8px;margin-bottom:3px;flex-wrap:wrap;}
  /* expanded factor row: per-camp source quotes */
  .fpgroup{margin:9px 0 0;padding:8px 11px;background:#F8F9FA;border:1px solid var(--line);border-radius:8px;}
  .fpg-h{display:flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;margin-bottom:4px;}
  .fpq{margin:7px 0 0;padding-left:15px;}
  .fpq-src{font-size:12.5px;color:var(--muted);}
  .factor .flabel{font-size:13px;font-weight:500;color:var(--muted);}
  .factor.crux .flabel{font-size:13.5px;font-weight:600;color:var(--ink);}
  .cruxbadge{font-family:var(--mono);font-size:9.5px;background:var(--chrome);color:#fff;
    border-radius:5px;padding:2px 7px;display:inline-block;white-space:nowrap;}
  .pivotbadge{font-family:var(--mono);font-size:9.5px;background:#2f6296;color:#fff;
    border-radius:5px;padding:2px 7px;display:inline-block;white-space:nowrap;}
  .contestedtag{font-family:var(--mono);font-size:9.5px;color:#7fa8ce;}
  .onetag{font-family:var(--mono);font-size:9.5px;color:var(--faint);}
  .wkey{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--muted);
    margin:12px 0 16px;}
  .wkey .ws{font-family:var(--mono);font-size:11px;padding:2px 9px;border-radius:5px;
    border:1px solid var(--line);}
  .bs-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:12px;}
  .bs{border:1px solid var(--line);border-radius:11px;padding:13px 15px;}
  .bs .bs-h{font-family:var(--mono);font-size:12px;margin-bottom:8px;display:flex;
    align-items:center;gap:7px;}
  .bs ul{margin:0;padding-left:16px;} .bs li{font-size:13px;color:var(--muted);margin:4px 0;}
  .bs li b{color:var(--ink);font-weight:500;}
  .indpos{margin-bottom:22px;}
  .indpos:last-child{margin-bottom:0;}
  .indpos .ph{display:flex;align-items:baseline;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
  .indpos .plabel{font-size:14px;font-weight:600;}
  .indpos .peff{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--muted);}
  /* line-height must be 1: the inherited 1.55 builds a ~15px line box inside a 12px content box,
     which pushes the "?" off-centre. margin-left keeps it from butting against the label. */
  .infoicon{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;
    border-radius:50%;border:1px solid var(--faint);color:var(--faint);font-size:9.5px;
    line-height:1;font-family:var(--sans);cursor:pointer;vertical-align:1px;
    margin-left:5px;flex:none;}
  .infoicon:hover{border-color:var(--muted);color:var(--muted);}
  /* Light and quiet on purpose: same surface/'hairline border' language as a panel, so an
     explanation reads as part of the page rather than a dark overlay dropped on top of it. */
  #tip{position:fixed;z-index:100;max-width:260px;background:var(--surface);color:var(--ink);
    border:1px solid var(--line-strong);padding:7px 9px;border-radius:8px;font-size:12px;
    line-height:1.45;box-shadow:0 3px 10px rgba(0,0,0,.08);display:none;}
  .indkey{display:flex;gap:14px;flex-wrap:wrap;font-size:11.5px;color:var(--muted);margin:0 0 16px;}
  .indkey span{display:flex;align-items:center;gap:6px;}
  .indkey i{width:8px;height:8px;border-radius:2px;display:inline-block;}
  .indkey .warn{color:#b4232f;font-style:normal;font-weight:700;}
  .ind-note{font-size:12px;color:var(--muted);margin:8px 0 0;}

 "totalBases": 9, "basesPct": 100, "verifiedQuotes": 34, "totalQuotes": 34, "quotesPct": 100}}}, "blackholes": {"kb": {"meta": {"id": "blackholes", "question": "Could the LHC create a black hole that destroys Earth?", "version": 36, "updated": "2026-07-19T01:56:04.315853+00:00", "portal": {"id": "c6c6ad01ec11", "baseVersion": 33, "url": "https://groundknowledge.org"}, "schemaVersion": 2, "curated": {"by": "portal-admin", "since": "2026-07-19T15:35:27.496705+00:00"}}, "positions": [{"id": "pos_no_risk_lhc_collisions_are_safe", "label": "No risk — LHC collisions are safe", "hue": "#2E8B6F"}, {"id": "pos_residual_concern_the_safety_argument_has_wea", "label": "Residual concern — the safety argument has weak or speculative links", "hue": "#B4502E"}], "datasets": [{"id": "ds_cosmic_ray_empirical_bound_white_dwarf_neutr", "label": "Cosmic-ray empirical bound (white-dwarf \u0026 neutron-star survival)", "aliases": [], "confirmation": {"status": "confirmed", "method": "curator", "by": "Evgeniia", "ts": "2026-07-11T23:28:50-03:00", "note": "Audit metadata backfill: preserves the case's prior curator-confirmed decision; the source is a direct supporting source, not a verified dependency quote.", "source": "src_giddings_mangano_astrophysical_implications__2008"}, "kind": "observation", "proposition": "Cosmic rays above LHC energies have struck the Earth, Sun, white dwarfs and neutron stars for billions of years without destroying them; if LHC collisions could make a dangerous stable object, these dense stars would already be gone — an empirical upper bound on the risk."}, {"id": "ds_hawking_radiation_black_hole_evaporation", "label": "Hawking radiation (black-hole evaporation)", "aliases": [], "confirmation": {"status": "confirmed", "method": "curator", "by": "Evgeniia", "ts": "2026-07-11T23:28:50-03:00", "note": "Audit metadata backfill: preserves the case's prior curator-confirmed decision; the source is a direct supporting source, not a verified dependency quote.", "source": "src_ellis_giudice_mangano_tkachev_wiedemann_revi_2008", "sourceHistory": [{"from": "src_lhc_safety_assessment_group_lsag_review_of_t_2008", "to": "src_ellis_giudice_mangano_tkachev_wiedemann_revi_2008", "ts": "2026-07-16T01:38:08.647377+00:00", "reason": "Duplicate record for the same 2008 LSAG safety review (same authors, title, text, and finding); retain the journal-version record and repoint its dependencies."}]}, "kind": "argument", "proposition": "Any microscopic black hole produced would radiate away and evaporate essentially instantly via Hawking radiation, so it could never accrete."}, {"id": "ds_argument_reliability_analysis_probability_th", "label": "Argument-reliability analysis (probability the safety argument itself is flawed)", "aliases": [], "confirmation": {"status": "confirmed", "method": "curator", "by": "Evgeniia", "ts": "2026-07-11T23:28:50-03:00", "note": "Audit metadata backfill: preserves the case's prior curator-confirmed decision; the source is a direct supporting source, not a verified dependency quote.", "source": "src_kent_a_critical_look_at_risk_assessments_for_2004"}, "kind": "argument", "proposition": "The safety case is a chain of theoretical assumptions; the probability the argument as a whole is flawed is not negligible and is itself a residual risk."}, {"id": "ds_metastable_black_hole_accretion_scenario", "label": "Metastable-black-hole accretion scenario", "aliases": [], "confirmation": {"status": "confirmed", "method": "curator", "by": "Evgeniia", "ts": "2026-07-11T23:28:50-03:00", "note": "Audit metadata backfill: preserves the case's prior curator-confirmed decision; the source is a direct supporting source, not a verified dependency quote.", "source": "src_plaga_on_the_potential_catastrophic_risk_fro_2008"}, "kind": "argument", "proposition": "In some beyond-standard-model scenarios a metastable micro black hole might accrete rather than evaporate, so the no-evaporation branch is not fully excluded."}, {"id": "arg_production_impossibility", "label": "Production impossibility under standard gravity", "aliases": [], "kind": "argument", "proposition": "LHC collision energies (~10 TeV) are ~15 orders of magnitude below the Planck scale, so black-hole production is impossible in standard 4D gravity — it requires speculative large extra dimensions.", "confirmation": {"status": "confirmed", "method": "curator", "by": "Evgeniia", "ts": "2026-07-11T23:28:50-03:00", "note": "Audit metadata backfill: preserves the case's prior curator-confirmed decision; the source is a direct supporting source, not a verified dependency quote.", "source": "src_koch_bleicher_st_cker_exclusion_of_black_hol_2009"}}, {"id": "arg_accretion_timescale", "label": "Accretion-timescale safety argument", "aliases": [], "kind": "argument", "proposition": "Even a stable, neutral micro black hole would accrete matter far too slowly to grow dangerous within the lifetime of the Earth or the Sun.", "confirmation": {"status": "confirmed", "method": "curator", "by": "Evgeniia", "ts": "2026-07-11T23:28:50-03:00", "note": "Audit metadata backfill: preserves the case's prior curator-confirmed decision; the source is a direct supporting source, not a verified dependency quote.", "source": "src_giddings_mangano_astrophysical_implications__2008"}}, {"id": "ds_cms_run_2_black_hole_search_13_tev_138_fb_1", "label": "CMS Run 2 black-hole search (13 TeV, 138 fb^-1)", "aliases": [], "confirmation": {"status": "confirmed", "method": "curator", "ts": "2026-07-16T01:38:47.621342+00:00", "by": "source-audit-2026-07-15", "source": "src_a_search_for_microscopic_black_holes_string__2026", "note": "The CMS publication page directly identifies the Run 2 proton-proton collision dataset at 13 TeV with 138 fb^-1 of integrated luminosity."}}, {"id": "ds_atlas_strong_gravity_microscopic_black_hole_", "label": "ATLAS strong-gravity / microscopic black-hole search (13 TeV)", "aliases": [], "confirmation": {"status": "confirmed", "method": "curator", "ts": "2026-07-18T22:11:52.355697+00:00", "by": "Evgeniia", "note": "ATLAS 13 TeV strong-gravity/microscopic black-hole search (arXiv:1512.02586)"}}], "factors": [{"id": "f_reliability_of_the_cosmic_ray_safety_analogy", "label": "Reliability of the cosmic-ray safety analogy", "weights": {"pos_no_risk_lhc_collisions_are_safe": "high", "pos_residual_concern_the_safety_argument_has_wea": "high"}, "rationale": "The safety case treats the survival of dense stars as a decisive empirical bound; the residual-concern case disputes whether that bound excludes all plausible micro-black-hole scenarios.", "provenance": [{"source": "src_giddings_mangano_astrophysical_implications__2008", "pos": "pos_no_risk_lhc_collisions_are_safe", "quote": "We argue that cases with such an effect at shorter times than the solar lifetime are ruled out, since in these scenarios black holes produced by cosmic rays impinging on much denser white dwarfs and neutron stars would then catalyze their decay on time scales incompatible with their known lifetimes.", "weight": "high", "verifiedQuote": "exact", "quoteVerification": {"method": "verbatim-sentence-v2", "status": "exact", "textSha256": "a9b91dc5f83b4d2b54611ab5fa3192f4779d3508ed810538ae9a61222e8affd0", "textDepth": "full", "sourceUrl": "https://journals.aps.org/prd/abstract/10.1103/PhysRevD.78.035009", "reason": "verbatim-single-sentence", "canonicalized": false, "quoteSha256": "205dac7d04652dc043e62ced1ef32387db158d8a76c491712c2663a981b6610f", "normalizedCharStart": 636, "normalizedCharEnd": 936, "normalization": "NFKC-typography-whitespace-v1"}}, {"source": "src_plaga_on_the_potential_catastrophic_risk_fro_2008", "pos": "pos_residual_concern_the_safety_argument_has_wea", "quote": "Therefore the astrophysical argument of G \u0026 M fails to exclude the existence of mBHs in scenario 3 that are dangerous not because they accrete the whole Earth but because of their intense Hawking radiation.", "weight": "high", "verifiedQuote": "exact", "quoteVerificat // A checkmark is a cryptographic audit claim, not shorthand for "we fetched some text".  Only
// the current verifier, run against hashed source text, may create it.  Legacy/manual exact flags
// deliberately render as unchecked until they are re-audited.
function verifiedExact(p){
  const a=(p||{}).quoteVerification||{};

    a.status==="exact"&&a.textSha256&&a.quoteSha256);

  return "unchecked";

  if(st==="missing") return '<span class="flagicon" title="passage not found in the fetched text">⚠</span>';

function excerptHtml(quote,p,cls="q"){

}
// Expanded factor row: the factor's rationale, then — per position — the sources that actually
// weighed this factor, each with its verbatim quote and quote-verification badge. This is the
// crux layer "showing its work": the disagreement in each camp's own words, auditable per edge.
function factorDetailHtml(kb, f, activePos){
  const {src}=maps(kb);
  const groups=activePos.map(p=>{
    const rows=(f.provenance||[]).filter(pr=>pr.pos===p.id&&verifiedExact(pr));
    if(!rows.length) return "";
    const items=rows.map(pr=>{
      const s=src[pr.source]||{};
      const title=s.title?shortLabel(s.title,72)+(s.year?" ("+s.year+")":""):(pr.source||"");
      return `<div class="fpq"><div class="fpq-src">${esc(title)} ${pr.quote?quoteBadge(pr):""}</div>`+
        (pr.quote?excerptHtml(pr.quote,pr,"q"):"")+`</div>`;
    }).join("");
    return `<div class="fpgroup"><div class="fpg-h"><span style="width:8px;height:8px;border-radius:2px;background:${p.hue};display:inline-block;"></span> ${esc(p.shortLabel||shortLabel(p.label))} — ${rows.length} source${rows.length===1?"":"s"}</div>${items}</div>`;
  }).join("");
  const rat=f.rationale?`<div style="margin-bottom:8px;">${esc(f.rationale)}</div>`:"";
  return rat+(groups||'<span style="color:var(--faint)">No exact source sentence supports a weight for this factor yet; unchecked claims are excluded from the table.</span>');

// Human label for one restsOn entry: a dataset's label, or — for a src:<id> derivation edge —

function restLabel(kb, id){

  const s=String(id&&typeof id==="object" ? (id.ref||"") : (id||""));
  if(s.toLowerCase().startsWith("src:")){

// Fallback for KBs without a stored shortLabel: plain word-boundary truncation.
function shortLabel(s, max=20){
  s=String(s||"");
  if(s.length <= max) return s;
  const cut = s.lastIndexOf(' ', max);
  return (cut > max * 0.4 ? s.slice(0, cut) : s.slice(0, max)) + '…';
}

// Evidence-strength tier from study design -- a quality signal, not a gameable "trust score".
function strengthTier(ev){
  const e=(ev||"").toLowerCase();
  if(/rct|experimental|meta-analysis|evidence-synthesis|systematic/.test(e)) return {n:3,label:"strong evidence"};
  if(/observational|cohort|case-control|mechanistic|prospective/.test(e)) return {n:2,label:"moderate evidence"};
  if(/commentary|narrative|expert|advisory|opinion|editorial/.test(e)) return {n:1,label:"weaker evidence"};
  return {n:0,label:""};
}

// Drop a "quote" that justifies nothing: the paper's title echoed back, or a metadata /
// boilerplate line (publication dates, "accepted for publication", "a literature search was
// conducted", ...). Same guard as the pre-redesign template -- moved here so both the table
// and card views share it instead of duplicating the regex.
function cleanQuote(quote, title){
  if(!quote) return quote;
  const qn=q=>String(q||"").toLowerCase().replace(/[^a-z0-9]+/g," ").trim();
  const q=qn(quote), t=qn(title);
  const META=/^(accepted for publication|received|published|revised|first published|a (comprehensive )?literature search was conducted|this (review|article|study) (summari|describe|present))/;
  if(q && ((t && (q===t || (q.length>=12 && (t.indexOf(q)>=0||q.indexOf(t)>=0)))) || META.test(q))) return "";
  return quote;
}

function confBadge(conf, posLabel){

}

function quoteWarnHtml(pq, textDepth){
  const st=quoteState(pq);

  if(st==="altered") return `<span class="conf low" title="The wording only approximately matches source text and must not be presented as a quotation.">⚠ altered or paraphrased — not a verified quote</span>`;
  if(st==="missing") return `<span class="conf low" title="This wording was not found in the fetched ${esc(textDepth||"source")} text.">⚠ not found in fetched text</span>`;

}

// ONE renderer for every warning kind (concentration / method-monoculture / quote /
// low-confidence) -- see engine/assess.py::warnings. Used in both Coverage and Independence so
// a warning is never a bespoke banner maintained in two places with two different wordings.
// strip labeller decorations off a proposed-position vote key for display
function voteLabel(k){return String(k||"").replace(/^new:\s*/i,"").replace(/^pos[_ ]/,"").replace(/_/g," ");}
// mode: "compact" — the front page: one short line per warning + a jump button.
//       "detailed" — the Evidence tab: full detail; model-disagreement additionally
//                    lists each contested source with every model's vote.
function warningsHtml(warnings, mode){
  const kicker={concentration:"Several sources reuse the same evidence",
    "method-monoculture":"Possible shared weakness", "support-edge":"Evidence link awaiting review", quote:"Quote text not checked",
    "low-confidence":"Position may be weakly supported", "model-disagreement":"Source labels need review"};
  const detailed = mode==="detailed";
  if(!detailed){
    const rows=(warnings||[]).map(w=>{
      const label=w.positionId?(w.label||""):(w.headline||"").replace(/[.]$/g,"");
      return `<div class="warnline"><span class="warnmark">⚠</span><span><b>${esc(kicker[w.kind]||w.badge)}</b>${label?` · ${esc(label)}`:""}</span><button class="risk-link" data-view="independence">Details</button></div>`;
    }).join("");
    return rows?`<div class="warnlines">${rows}</div>`:"";
  }
  return (warnings||[]).map(w=>{
    const srcs=detailed?(w.sources||[]).map(s=>{
      const vote=Object.entries(s.vote||{}).map(([k,n])=>`${voteLabel(k)} (${n})`).join(" · ");
      return `<div class="warn-src"><b>${esc(shortLabel(s.title,80))}</b><br>
        <span style="color:var(--muted)">model votes: ${esc(vote||"—")}</span></div>`;
    }).join(""):"";
    const dest=(w.kind==="concentration"||w.kind==="method-monoculture")?"independence":"coverage";
    const btn={independence:"See the evidence bases",coverage:"Open these sources"}[dest];
    return `<div class="method-alert">
      <div class="risk-kicker">${esc(kicker[w.kind]||w.badge)}</div>
      <div>${esc(w.detail)}</div>${srcs}
      ${!detailed?`<button class="risk-link" data-view="${dest}">${btn}</button>`:""}
    </div>`;
  }).join("");
}

function caseLabel(c){
  // CLI cases have a human id ("eggs"); portal questions have a generated hex id -- for those
  // show a short version of the question instead, so the chip is informative.
  const mid=c.kb.meta.id||"";
  if(/^[0-9a-f]{8,}$/i.test(mid)){
    const q=c.kb.meta.question||mid;
    return q.length>44?q.slice(0,42)+"…":q;
  }
  return mid;
}

// Paul Tol's "muted" qualitative palette — colourblind-safe, and no position's colour reads as
// "the right answer" (red/green are never the two opposing camps). Applied at render time over any
// stored hue, so every case is consistent regardless of the order positions were created.
const PAL=["#332288","#CC6677","#44AA99","#DDCC77","#88CCEE","#AA4499","#882255","#117733"];
let posHue={};
// Tol's palette mixes dark and light swatches, so pick label ink by luminance instead of assuming
// white reads on every hue (white on #DDCC77 / #88CCEE would be unreadable).
function inkOn(hue){
  const h=String(hue||"").replace("#","");
  if(h.length!==6) return "#fff";
  const r=parseInt(h.slice(0,2),16), g=parseInt(h.slice(2,4),16), b=parseInt(h.slice(4,6),16);
  return (0.299*r+0.587*g+0.114*b)>150 ? "var(--ink)" : "#fff";
}
function remapHues(node){
  if(Array.isArray(node)){ for(const x of node) remapHues(x); return; }
  if(node && typeof node==="object"){
    const pid=(node.id&&posHue[node.id])?node.id:((node.positionId&&posHue[node.positionId])?node.positionId:null);
    if(pid && ("hue" in node)) node.hue=posHue[pid];
    for(const k in node) remapHues(node[k]);
  }
}

function filteredSources(kb){
  return kb.sources.filter(s=>{
    if(!state.posOn.has(s.position)) return false;
    if(state.filter.q){
      const q=state.filter.q.toLowerCase();
      if(!(s.title||"").toLowerCase().includes(q) && !(s.venue||"").toLowerCase().includes(q)) return false;
    }
    if(state.filter.ev && s.evidence!==state.filter.ev) return false;
    if(state.filter.fu && (s.funding||"Undisclosed")!==state.filter.fu) return false;
    if(state.filter.flagged){
      const pq=((s.provenance||{}).position)||{};
      if(!pq.quote || verifiedExact(pq)) return false;
    }
    return true;
  });
}

function headline(c){
  const {kb,assessment:a}=c, {pos}=maps(kb);
  // Keep the two quantities in separate charts, in different shapes. Source count is a 100% share;
  // the adjusted count is an absolute small-multiples chart on one shared scale. Giving them the
  // same shape invites reading the source tally as a denominator of the adjusted count, which it
  // is not — they answer different questions.
  const bar=(rows,pctKey,sizeKey,tipFn)=>rows.map(d=>{
    const label=(pos[d.id]&&pos[d.id].shortLabel)||shortLabel(d.label);
    const p=d[pctKey]||0;
    const fits=p>=(label.length*0.9+4);
    const text=fits?(label+" · "+p+"%"):(p+"%");
    const dim=state.posOn.has(d.id)?"":" dim";
    // Tol's palette includes light swatches, so pick each segment's ink by luminance — .seg's
    // default white is unreadable on e.g. #DDCC77.
    return `<button class="seg${dim}" data-pos="${d.id}" style="flex:${d[sizeKey]||0.0001};background:${d.hue};color:${inkOn(d.hue)}" title="${esc(tipFn(d))}">${esc(text)}</button>`;
  }).join("");
  const bar1=bar(a.distribution,"pct","count",d=>`${d.label} — ${d.count} sources`);
  const wd=a.weightedDistribution||[];
  const maxEff=Math.max(1,...wd.map(d=>d.weight||0));
  const indepRows=wd.map(d=>{
    const nb=d.weight||0, raw=d.raw||0, fillPct=Math.max(2,Math.round(nb/maxEff*100));
    const proposed=d.provisionalCount?` <span class="collapse">+ ${d.provisionalCount} awaiting review — not counted</span>`:"";
    return `<div class="indrow${state.posOn.has(d.id)?"":" dim"}">
      <span class="indlab"><span class="dot" style="background:${d.hue}"></span><span class="indlabtxt">${esc(d.label)}</span></span>
      <span class="indtrackcol"><span class="indtrack" data-tip="${nb.toFixed(1)} adjusted evidence bases from ${raw} sources"><span class="indfill" style="width:${fillPct}%;background:${d.hue}"></span></span></span>
      <span class="indval"><b>${nb.toFixed(1)}</b> adjusted evidence bases <span class="collapse">from ${raw} sources</span>${proposed}</span>
    </div>`;
  }).join("");
  let insight="";
  if(wd.length){
    let big=null;
    wd.forEach(w=>{if(!w.raw)return; const ratio=w.weight/w.raw;
      if(big===null||ratio<big.ratio) big={label:w.label,raw:w.raw,nb:w.weight,ratio};});
    insight = (big && big.raw>=3 && big.nb<big.raw*0.6)
      ? `<div class="cmpinsight">Most evidence reuse: <b>${esc(big.label)}</b>, ${big.raw} sources → <b>${big.nb.toFixed(1)} adjusted evidence bases</b>.</div>`
      : `<div class="cmpinsight">No position is dominated by repeated use of the same evidence.</div>`;
  }
  const warnHtml=warningsHtml(a.warnings, "compact");
  let skewHtml="";
  if(a.fundingSkew){
    const f=a.fundingSkew, parts=[];
    if(f.top) parts.push(`of ${f.n} interested-funding source${f.n===1?"":"s"} (industry/advocacy), the largest share back <b style="color:var(--ochre)">"${esc(f.top.label)}"</b>`);
    else if(f.tied&&f.leaders&&f.leaders.length) parts.push(`interested funding is tied across ${f.leaders.map(x=>`<b style="color:var(--ochre)">"${esc(x.label)}"</b> (${x.count})`).join(" and ")}`);
    if(f.undisclosed) parts.push(`${f.undisclosed} of ${f.total} source${f.total===1?"":"s"} don't disclose funding`);
    if(parts.length) skewHtml=`<div class="skew"><span>⚠</span><span>${parts.join("; ")} — weigh before counting heads.</span></div>`;
  }
  // Off-topic refusals, surfaced (not silently dropped): a wrongly-refused source is invisible
  // suppression, so it's shown and reversible. Excluded from every metric.
  const refused=(kb.refused||[]);
  let refusedHtml="";
  if(refused.length){
    const items=refused.slice(0,25).map(r=>`<li>${esc(r.title||"(untitled)")}${r.reason?` — <span style="color:var(--muted)">${esc(r.reason)}</span>`:""}</li>`).join("");
    refusedHtml=`<details class="refused"><summary>${refused.length} source${refused.length===1?"":"s"} fetched but refused as off-topic</summary>
      <ul>${items}</ul>
      <div class="refnote">Recorded for transparency and excluded from every metric — a wrongly-dropped source is visible here rather than silently gone. Re-admit one by re-ingesting it or removing it from the case's <code>refused</code> list.</div></details>`;
  }
  return `<div class="panel compact-summary">
      <div class="cmphead"><b>Source count versus underlying evidence</b><span>two different ways to read the same literature</span></div>
      <div class="splitlabel"><span class="num">1</span> Source count <span class="q">— how listed sources split by position · click a segment to filter</span></div>
      <div class="distrib">${bar1}</div>
      ${wd.length?`<div class="splitlabel"><span class="num">2</span> Adjusted evidence-base count <span class="q">— shared evidence is counted once</span></div>
      <div class="indeprows">${indepRows}</div>${insight}
      <details class="cmphelp"><summary>How to read these two charts</summary><div>The first chart counts sources. The second counts each checked evidence base once; evidence available only through reviews or animal/in-vitro work counts as half. It is <b>not a support, quality, or truth score</b>: one decisive study can outweigh several weak evidence bases, and separate studies can share the same weakness.<button class="risk-link" data-view="independence">Inspect the evidence</button></div></details>`:""}
      ${warnHtml}
      ${skewHtml}${refusedHtml}
    </div>`;
}

function renderCoverageView(){
  const c=cur(), {kb,assessment:a}=c, {pos,ds}=maps(kb);
  let rows=filteredSources(kb).slice().sort((x,y)=>{
    const k=state.sort.key;
    let av=k==="p"?pos[x.position].label:x[{t:"title",y:"year",ev:"evidence",ds:"restsOn"}[k]||k];
    let bv=k==="p"?pos[y.position].label:y[{t:"title",y:"year",ev:"evidence",ds:"restsOn"}[k]||k];
    if(k==="ds"){av=(x.restsOn||[]).length;bv=(y.restsOn||[]).length;}

      const fv=s=>{const pq=((s.provenance||{}).position)||{}; return pq.quote&&!verifiedExact(pq)?2:verifiedExact(pq)?0:1;};
      av=fv(x);bv=fv(y);

      const dsLabel=rests.length?esc(rests[0])+(rests.length>1?" +"+(rests.length-1):""):"—";

    const items=[];

     +`<div class="mmeta" style="margin-bottom:12px;">every source behind this question — filter, sort, and expand a row for its quote and evidence. Strength dots, by study design: <b>●●●</b> strong (RCT / meta-analysis) · <b>●●○</b> moderate (observational) · <b>●○○</b> weaker (opinion / commentary).</div>`

    +`<div class="panel"><h1 style="font-size:14px;margin:0 0 4px;">What each position leaves out</h1><div class="mmeta" style="margin-bottom:14px;">evidence types and groups found elsewhere in the case but missing from a position's sources</div><div class="bs-grid">${bsCards}</div></div>`;

  el("main").querySelector("#fq").oninput=e=>{state.filter.q=e.target.value;state.shown=24;renderMain();};
  el("main").querySelector("#fEv").onchange=e=>{state.filter.ev=e.target.value;state.shown=24;renderMain();};
  el("main").querySelector("#fFu").onchange=e=>{state.filter.fu=e.target.value;state.shown=24;renderMain();};
  el("main").querySelector("#fFlag").onchange=e=>{state.filter.flagged=e.target.checked;state.shown=24;renderMain();};

  if(state.display==="table"){
    el("main").querySelectorAll("[data-sort]").forEach(th=>th.onclick=()=>{
      const k=th.getAttribute("data-sort");
      if(state.sort.key===k) state.sort.dir*=-1; else state.sort={key:k,dir:1};

    });
    el("main").querySelectorAll(".rowmain").forEach(tr=>tr.onclick=()=>{
      const id=tr.getAttribute("data-id");
      if(state.expanded.has(id)) state.expanded.delete(id); else state.expanded.add(id);
      renderMain();
    });
  }
  el("main").querySelectorAll("[data-d]").forEach(b=>b.onclick=()=>{state.display=b.getAttribute("data-d");renderMain();});
  const sm=el("main").querySelector("#showMore"); if(sm) sm.onclick=()=>{state.shown+=24;renderMain();};
}

function renderDivergenceView(){
  const c=cur(), {kb,assessment:a}=c;
  const cruxBy={}; (a.cruxes||[]).forEach(x=>cruxBy[x.id]=x);
  const info=f=>cruxBy[f.id]||{spread:0,isCrux:false,engaged:0,crossCampCrux:false,sharedPivot:false,contestedWeight:false};
  const activePos=kb.positions.filter(p=>state.posOn.has(p.id));
  const rank=z=>z.isCrux?0:(z.engaged>=2?1:2);
  const ordered=kb.factors.slice().sort((x,y)=>{const ix=info(x),iy=info(y);
    return rank(ix)-rank(iy) || iy.spread-ix.spread || iy.engaged-ix.engaged;});
  const posColW=Math.min(20,Math.floor(60/Math.max(1,activePos.length)));
  const colgroup=`<colgroup><col style="width:${100-posColW*activePos.length}%">${activePos.map(()=>`<col style="width:${posColW}%">`).join("")}</colgroup>`;
  const head=`<th class="nosort">Issue</th>`+activePos.map(p=>`<th class="nosort" style="background:${p.hue};color:${inkOn(p.hue)};text-align:center;" data-tip="${esc(p.label)}">${esc(p.shortLabel||shortLabel(p.label))}</th>`).join("");
  const rows=ordered.map(f=>{
    const cx=info(f), one=cx.engaged<2;
    const cells=activePos.map(p=>{
      const w=f.weights[p.id]||"—"; const v=WV[WLABEL[w]!==undefined?w:""]||WV[w]||0;
      const bg=WCELL[v], txt=v?inkOn(bg):"var(--faint)";
      return `<td style="text-align:center;background:${bg};color:${txt};font-family:var(--mono);font-weight:600;white-space:nowrap;">${w&&w!=="n/a"?esc(WLABEL[w]||w):"—"}</td>`;
    }).join("");
    const open=state.expanded.has("f"+f.id);
    const detail=open?`<tr class="detailrow"><td colspan="${activePos.length+1}">${factorDetailHtml(kb,f,activePos)}</td></tr>`:"";
    const tag=cx.crossCampCrux?' <span class="cruxbadge">KEY DISAGREEMENT</span>'
      :cx.sharedPivot?' <span class="pivotbadge">SHARED UNCERTAINTY</span>'
      :one?' <span class="onetag">one side only</span>'
      :cx.contestedWeight?' <span class="contestedtag">contested</span>':"";
    const labelStyle=cx.isCrux?"font-weight:600;":one?"color:var(--muted);":"";
    return `<tr class="rowmain${one?" onesided":""}" data-fid="${esc(f.id)}">
        <td class="wrap" style="${labelStyle}">${esc(f.label)}${tag}</td>
        ${cells}
      </tr>${detail}`;
  }).join("");
  const nCross=(a.cruxes||[]).filter(x=>x.crossCampCrux).length;
  const nPivot=(a.cruxes||[]).filter(x=>x.sharedPivot).length;
  const nOne=(a.cruxes||[]).filter(x=>x.engaged<2).length;
  const nContested=(a.cruxes||[]).filter(x=>x.contestedWeight&&!x.crossCampCrux&&!x.sharedPivot).length;
  const cruxBits=[];
  if(nCross) cruxBits.push(`<b>${nCross} key disagreement${nCross===1?"":"s"}</b>`);
  if(nPivot) cruxBits.push(`<b>${nPivot} shared uncertaint${nPivot===1?"y":"ies"}</b>`);
  if(nContested) cruxBits.push(`${nContested} contested`);
  if(nOne) cruxBits.push(`${nOne} raised by one side`);
  el("main").innerHTML=`<h1>Key issues</h1><div class="mmeta">where positions disagree and what several positions say matters</div>
    <div class="panel">
      <div class="subnote">Each cell shows how important that factor is to a position. A <b>key disagreement</b> (black tag) is a factor the positions rate very differently. A <b>shared uncertainty</b> (blue tag) is an unsettled factor that several positions consider decisive. <b>Contested</b> rows are milder disagreements; <b>one side only</b> rows are raised by a single position. <b>Click a row</b> to see the reasoning and source quotes behind it.</div>
      <div class="wkey">importance: <span class="ws" style="background:${WCELL[1]}">low</span><span class="ws" style="background:${WCELL[2]}">medium</span><span class="ws" style="background:${WCELL[3]};color:${inkOn(WCELL[3])}">high</span><span class="ws" style="border-style:dashed;color:var(--faint)">— not weighed</span></div>
      <div class="tbl-wrap"><table>${colgroup}<thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table></div>
      <p style="font-size:13px;color:var(--muted);margin:14px 0 0">${cruxBits.join(" · ")||"no key disagreements"} — of ${kb.factors.length} factors.</p>
    </div>`;
  el("main").querySelectorAll(".rowmain").forEach(tr=>tr.onclick=()=>{
    const k="f"+tr.getAttribute("data-fid");
    if(state.expanded.has(k)) state.expanded.delete(k); else state.expanded.add(k);
    renderMain();
  });
}

function renderIndependenceView(){
  const c=cur(), {kb,assessment:a}=c;
  const KIND={dataset:{lab:"evidence base",col:"#222a35"},
              primary:{lab:"own observation",col:"#222a35"},
              secondary:{lab:"secondary voice",col:"#c4ccd4"},
              cycle:{lab:"circular loop",icon:"⚠"}};
  const BASE_KIND={dataset:"dataset",experiment:"experiment",observation:"observation",
                   argument:"argument",model:"model",document:"document"};
  const methodByPos={}; (a.methodAudit||[]).forEach(m=>methodByPos[m.id]=m);
  const activePos=(a.independence||[]).filter(p=>state.posOn.has(p.id));
  const sections=activePos.map(p=>{
    const list=(p.bases||[]);
    const shownN=state.expandedBases[p.id]?list.length:Math.min(6,list.length);
    const shown=list.slice(0,shownN);
    const rows=shown.map(b=>{
      const k=KIND[b.kind]||KIND.dataset;
      const kindLabel=b.kind==="dataset" ? (BASE_KIND[b.baseKind]||k.lab) : k.lab;
      const notes=[];
      if(b.secondaryOnly) notes.push("available through reviews only — half weight");
      if(b.nonHuman) notes.push("animal / in-vitro only — half weight");
      if(b.provisional) notes.push("awaiting review — not counted");
      if(b.supportUnconfirmed) notes.push("evidence link awaiting review — not counted");
      if(b.aliasSuspect) notes.push("possible duplicate name — curator review needed");
      if(b.kind==="cycle") notes.push("sources cite each other without reaching primary evidence — not counted");
      if(b.confirmedBy){
        const cb=b.confirmedBy, sm=maps(kb).src[cb.source], who=cb.by||cb.curator;
        const how=cb.method==="verified-edge"||cb.method==="verified-edge-legacy-single"
          ? `verified from source text${sm?" · "+shortLabel(sm.title,36):cb.source?" · "+cb.source:""}`
          : `confirmed by curator${who?" · "+who:""}${sm?" · supporting source: "+shortLabel(sm.title,36):""}`;
        notes.push(`${how}${cb.ts?" · "+String(cb.ts).slice(0,10):""}`);
        if(cb.note) notes.push(`reason: ${shortLabel(cb.note,90)}`);
      }
      return `<tr><td>${esc(b.label)}</td><td style="color:var(--muted);white-space:nowrap;">${esc(kindLabel)}</td>
        <td style="font-family:var(--mono);text-align:right;">${b.weight}</td><td style="font-family:var(--mono);text-align:right;">${b.strength}</td><td style="color:var(--faint);">${esc(notes.join(", ")||"—")}</td></tr>`;
    }).join("");
    const more=list.length>6?`<div class="showmore"><button data-more="${p.id}">${state.expandedBases[p.id]?"Show fewer":"Show "+(list.length-6)+" more"}</button></div>`:"";
    const mixTypes=(p.evidenceMix||[]).slice(0,6).map(m=>`${esc(m.evidence)} ×${m.count}`).join(" · ");
    const mix=`<div class="ind-mix"><b>${p.raw}</b> source${p.raw===1?"":"s"} by type${mixTypes?` <span class="mixtypes">— ${mixTypes}</span>`:""}<span class="infoicon" title="The ${p.raw} sources under this position, grouped by evidence type. Sources using the same evidence base are counted together. The adjusted count measures breadth and reuse, not quality or truth.">?</span></div>`;
    const sec=p.collapsedSecondary>1?`<div class="ind-note">${p.collapsedSecondary} secondary sources (reviews / commentary / statements) do not reach a more specific evidence base, so they are <b>counted together as one secondary voice</b>.</div>`:"";
    const circ=(p.circular&&p.circular.length)?`<div class="ind-note warn">⚠ Sources cite each other without reaching primary evidence — ${p.circular.length} citation loop${p.circular.length>1?"s":""}, <b>not counted</b>.</div>`:"";
    let method="";
    const ma=methodByPos[p.id];
    if(ma&&ma.top){
      const allShare=pct(ma.top.count/(ma.raw||1));
      const grouped=ma.classed===ma.raw
        ?"Every source in this position belongs to a recognized group of methods with a common risk."
        :`This check grouped ${ma.classed} of ${ma.raw} sources by shared method weakness; the rest are secondary evidence or designs it does not group.`;
      const status=ma.monoculture
        ?"This is enough of the position to suggest a shared blind spot. It does not change the adjusted evidence-base count."
        :"This is below the warning threshold and does not change the adjusted evidence-base count.";
      method=`<div class="ind-note${ma.monoculture?" warn":""}">Shared method weakness: ${ma.top.count} of ${ma.raw} sources share <b>${esc(ma.top.label)}</b> (${allShare} of all sources). ${grouped} ${status}</div>`;
    }
    return `<div class="indpos">
        <div class="ph"><span style="width:9px;height:9px;border-radius:2px;background:${p.hue};display:inline-block;"></span>
          <span class="plabel">${esc(p.label)}</span>
          <span class="peff">${p.nEff.toFixed(1)} adjusted evidence bases from ${p.raw} source${p.raw===1?"":"s"}${p.provisionalCount?` <span class="collapse">+ ${p.provisionalCount} awaiting review — not counted</span>`:""}
            <span class="infoicon" title="Each checked evidence base counts once. Review-only and animal/in-vitro evidence count as 0.5. Unchecked evidence links and citation loops count as zero. This measures breadth and reuse, not study quality, effect size, or truth.">?</span>
          </span></div>
        ${mix}
        <div class="tbl-wrap"><table class="covtbl"><colgroup><col style="width:34%"><col style="width:14%"><col style="width:14%"><col style="width:14%"><col style="width:24%"></colgroup><thead><tr><th class="nosort">Evidence base</th><th class="nosort">Type</th><th class="nosort" style="text-align:right;">Sources using it <span class="infoicon" title="How much of this position's listed sourcing uses this evidence. This drives the reuse warning, not the adjusted count.">?</span></th><th class="nosort" style="text-align:right;">Counts as <span class="infoicon" title="This evidence base's one-time contribution to the adjusted count. Zero means it has not been checked; half means it is available only through reviews or animal/in-vitro work.">?</span></th><th class="nosort">Notes</th></tr></thead><tbody>${rows}</tbody></table>${more}</div>
        ${sec}${circ}${method}
      </div>`;
  }).join("");
  const flag=(a.warnings&&a.warnings.length) ? warningsHtml(a.warnings, "detailed")
    : `<div class="flagbox"><span>No single evidence base dominates a position. Reviews that repeat primary sources and citation loops are already counted together.</span></div>`;
  el("main").innerHTML=`<h1>Evidence reuse</h1><div class="mmeta">which sources reuse the same data, arguments, or documents — and the weaknesses they share</div>
    <div class="panel">
      <div class="subnote"><b>Adjusted evidence-base count</b> counts each checked evidence base once. When several sources use the same evidence, it is counted once; evidence available only through reviews or animal/in-vitro work counts as half. Unchecked links and citation loops stay visible but do not count. This shows evidence breadth and reuse, <b>not correctness or quality</b>; separate evidence bases can still share methods, incentives, or blind spots.</div>
      <div class="indkey"><span><i style="background:#222a35"></i>primary evidence (dataset / own data)</span><span><i style="background:#c4ccd4"></i>secondary source</span><span><b class="warn">⚠</b> citation loop</span></div>
      ${sections}${flag}
    </div>`;
  el("main").querySelectorAll("[data-more]").forEach(b=>b.onclick=()=>{
    const k=b.getAttribute("data-more"); state.expandedBases[k]=!state.expandedBases[k]; renderMain();
  });
}

// "distribution: <position label> 41 -> 42" / "concentration: <position label> 45% -> 44%"
function parseDiffLine(kb,line){
  const m=line.match(/^(\w[\w -]*):\s*(.+?)\s+([\d.]+%?)\s*→\s*([\d.]+%?)$/);
  if(!m) return null;
  const [,metric,label,before,after]=m;
  const pos=kb.positions.find(p=>p.label===label||p.shortLabel===label);
  return {metric,before,after,hue:pos?pos.hue:"var(--faint)",label:pos?(pos.shortLabel||shortLabel(pos.label)):label,warn:line.indexOf("⚠")===0};
}
function deltaBadges(kb,diff){
  const parsed=(diff||[]).map(l=>parseDiffLine(kb,l)).filter(Boolean);
  if(!parsed.length) return (diff&&diff.length)?esc(diff[0]):`<span style="color:var(--faint)">(no metric changes)</span>`;
  const shown=parsed.slice(0,2).map(d=>
    `<span class="deltapill"><span class="dot" style="background:${d.hue}"></span>${esc(d.metric)} ${esc(d.before)}→${esc(d.after)}</span>`).join("");
  const more=parsed.length>2?`<span class="deltamore">+${parsed.length-2}</span>`:"";
  return shown+more;
}
// Curation actions (merge-position / dedupe-sources / tidy / ...) share one shape --
// {action, summary} with no title/source/diff -- distinct from a seed and from a normal
// add-source entry. Anything with a summary and no diff array falls in this bucket, so a
// future curation command needs no viewer change to show up here (same "generic over kind"
// discipline as warningsHtml).
const CURATION_LABEL={"merge-position":"merged positions","dedupe-sources":"de-duplicated sources","tidy":"tidied labels"};
function renderChangesView(){
  const c=cur(), kb=c.kb, log=(kb.log||[]).slice().reverse();
  const posLabel=id=>{const p=kb.positions.find(x=>x.id===id); return p?(p.shortLabel||p.label):id;};
  const rows=log.map(e=>{
    const key="v"+e.version+"-"+(e.action||"");
    const open=state.expandedChanges.has(key);
    const isSeed=e.action==="seed";
    const isCuration=!isSeed && e.summary!=null && e.diff==null;
    let title, badges, detailBody;
    if(isSeed){
      title=`(seed) ${e.sources||kb.sources.length} sources established the initial knowledge base`;
      badges=`<span class="deltapill"><span class="dot" style="background:var(--chrome)"></span>seeded · ${e.sources||kb.sources.length} sources</span>`;
      detailBody=`${esc(e.sources||kb.sources.length)} sources established the initial knowledge base.`;
    } else if(isCuration){
      const label=CURATION_LABEL[e.action]||e.action||"curation";
      title=`${label} — ${e.summary}`;
      badges=`<span class="deltapill"><span class="dot" style="background:var(--faint)"></span>${esc(label)}</span>`;
      detailBody=esc(e.summary);
    } else {
      title=`added “${e.title||e.source||""}”`;
      const dsB=(e.newDatasets&&e.newDatasets.length)?`<span class="deltapill"><span class="dot" style="background:var(--flag)"></span>+${e.newDatasets.length} new dataset${e.newDatasets.length===1?"":"s"}</span>`:"";
      const posB=(e.newPositions&&e.newPositions.length)?`<span class="deltapill"><span class="dot" style="background:var(--ochre)"></span>+${e.newPositions.length} new position${e.newPositions.length===1?"":"s"}</span>`:"";
      badges=deltaBadges(kb,e.diff)+dsB+posB;
      detailBody=((e.diff&&e.diff.length)?e.diff.map(d=>`<div>${esc(d)}</div>`).join(""):`<div style="color:var(--faint)">(no metric changes)</div>`)
        + (e.newDatasets&&e.newDatasets.length?`<div>new dataset(s): ${e.newDatasets.map(esc).join(", ")}</div>`:"")
        + (e.newPositions&&e.newPositions.length?`<div>new position(s): ${e.newPositions.map(id=>esc(posLabel(id))).join(", ")}</div>`:"");
    }
    const detail=open?`<tr class="detailrow"><td colspan="4">${detailBody}</td></tr>`:"";
    return `<tr class="rowmain" data-key="${esc(key)}"><td style="font-family:var(--mono);color:var(--muted);white-space:nowrap;">v${e.version}</td>
        <td style="color:var(--faint);white-space:nowrap;">${e.ts?esc(e.ts.slice(0,10)+" "+e.ts.slice(11,16)):""}${e.by?" · "+esc(e.by):""}</td>
        <td><div class="clamp2">${esc(title)}</div></td>
        <td><div class="deltawrap">${badges}</div></td></tr>${detail}`;
  }).join("");
  const colgroup=`<colgroup><col style="width:9%"><col style="width:14%"><col style="width:51%"><col style="width:26%"></colgroup>`;
  el("main").innerHTML=`<h1>Changes</h1><div class="mmeta">an edit log for this case — newest first. A record of what was added or curated and by whom, <b>not a chronological research timeline</b>: sources can be added in any order.</div>
    <div class="panel">${rows?`<div class="tbl-wrap"><table>${colgroup}<thead><tr><th class="nosort">Version</th><th class="nosort">Date</th><th class="nosort">Source added</th><th class="nosort">Key change</th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="empty">No history yet — only the seed.</div>'}</div>`;
  el("main").querySelectorAll(".rowmain").forEach(tr=>tr.onclick=()=>{
    const k=tr.getAttribute("data-key");
    if(state.expandedChanges.has(k)) state.expandedChanges.delete(k); else state.expandedChanges.add(k);
    renderMain();
  });
}

function renderMain(){

function switchCase(id){

}
if(DATA) switchCase(state.caseId);

// Tooltips: the browser's native `title` only appears after a ~1s delay and is dead on touch, so
// every explanation here is rendered as our own instant tooltip instead. The first time an element
// is hovered we move its `title` onto `data-tip` (and mirror it to aria-label for screen readers),
// which permanently suppresses the native one for that node.
// Scoped to the deliberate explanation affordances ("?" icons, help-cursor badges, and anything we
// explicitly gave a data-tip). Firing on every [title] made tooltips pop up constantly while just
// moving across the page; incidental titles keep the browser's own quiet default.
const TIP_SEL=".infoicon,.qbadge,[data-tip]";
function tipTextOf(el){
  const t=el.getAttribute("title");
  if(t){ el.setAttribute("data-tip",t); el.setAttribute("aria-label",t); el.removeAttribute("title"); }
  return el.getAttribute("data-tip")||"";
}
function hideTip(){ const t=document.getElementById("tip"); if(t) t.style.display="none"; }
function showTip(el){
  const txt=tipTextOf(el); if(!txt) return;
  let tip=document.getElementById("tip");
  if(!tip){tip=document.createElement("div");tip.id="tip";document.body.appendChild(tip);}
  tip.textContent=txt; tip.style.display="block";
  const r=el.getBoundingClientRect();
  tip.style.left=Math.max(8,Math.min(r.left,window.innerWidth-tip.offsetWidth-8))+"px";
  tip.style.top=(r.bottom+6+tip.offsetHeight>window.innerHeight?r.top-tip.offsetHeight-6:r.bottom+6)+"px";
}
document.addEventListener("mouseover",e=>{
  const el=e.target.closest&&e.target.closest(TIP_SEL); if(el) showTip(el);
});
document.addEventListener("mouseout",e=>{
  if(e.target.closest&&e.target.closest(TIP_SEL)) hideTip();
});
// Touch/click: open the note instead of falling through (capture, so a "?" inside a table row does
// not also toggle the row).
document.addEventListener("click",e=>{
  const ic=e.target.closest(".infoicon");
  if(ic){ e.stopPropagation(); e.preventDefault(); showTip(ic); return; }
  hideTip();
}, true);
window.addEventListener("scroll",hideTip,true);
document.addEventListener("click",e=>{
  const cs=e.target.closest("[data-case]"); if(cs){switchCase(cs.getAttribute("data-case"));renderMain();return;}
  const nv=e.target.closest("[data-view]"); if(nv){state.view=nv.getAttribute("data-view");state.shown=24;renderMain();return;}
  const pc=e.target.closest("[data-pos]"); if(pc){
    const id=pc.getAttribute("data-pos");
    if(state.posOn.has(id)) state.posOn.delete(id); else state.posOn.add(id);
    renderMain(); return;
  }
  const wj=e.target.closest("[data-jump]"); if(wj){state.view=wj.getAttribute("data-jump");renderMain();return;}
});
renderMain();
</script>
</body>
